<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover" />
  <title>🐼熊猫档案🐼</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐼</text></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
    body { background: #f3efe8; padding: 16px; min-height: 100vh; display: flex; justify-content: center; }
    #app {
      max-width: 1000px; width: 100%; background: white; border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 20px 20px 28px;
      position: relative;
      min-height: 80vh;
    }
    .page-container { position: relative; overflow: hidden; }
    .page-view { display: none; animation: fadeSlideIn 0.25s ease-out; }
    .page-view.active { display: block; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .nav-tabs {
      display: flex; align-items: center; gap: 6px; margin-bottom: 20px;
      border-bottom: 2px solid #e3dbcf; padding-bottom: 6px;
    }
    .nav-tab {
      padding: 10px 22px; border-radius: 40px 40px 0 0; font-weight: 600; color: #4b5f48;
      background: #f0ece5; cursor: pointer; transition: 0.1s; border: 1px solid transparent;
      font-size: 0.95rem; display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    .nav-tab i { font-size: 1rem; }
    .nav-tab.active { background: #3a5a3a; color: white; border-color: #2d4a2d; }
    .nav-tab:hover:not(.active) { background: #e3dbcf; }
    .nav-tab.home-tab { cursor: pointer; }

    .storage-status {
      font-size: 0.75rem; color: #2d6b4c; background: #f0ede8;
      padding: 6px 14px; border-radius: 40px; display: inline-flex; align-items: center;
      height: 100%; margin-left: 12px; line-height: 1;
    }

    .browse-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin: 8px 0 16px;
    }
    .browse-toolbar .btn-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn {
      background: #e8e2d8; border: none; padding: 9px 18px; border-radius: 40px;
      font-weight: 500; font-size: 0.9rem; display: inline-flex; align-items: center;
      gap: 8px; cursor: pointer; transition: 0.1s; color: #2a3a28;
    }
    .btn i { font-size: 1rem; }
    .btn-success { background: #2d6b4c; color: white; }
    .btn-success:hover { background: #1f573b; }
    .btn-warning { background: #b78a5c; color: white; }
    .btn-warning:hover { background: #9f744b; }
    .btn-outline { background: transparent; border: 1px solid #b9ae9a; }
    .btn-outline:hover { background: #e3dbcf; }
    .btn-primary { background: #3a5a3a; color: white; }
    .btn-primary:hover { background: #2d4a2d; }
    .btn-danger { background: #b33c3c; color: white; }
    .btn-danger:hover { background: #8f2e2e; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-group .btn.active-mode { background: #3a5a3a; color: white; border-color: #2d4a2d; }
    .btn-group .btn.filter-active { background: #5a7a5a; color: white; border-color: #4a6a4a; }
    .btn-group .btn.filter-active:hover { background: #4a6a4a; }

    .search-box {
      display: flex; background: #f0ede8; border-radius: 60px; padding: 4px 4px 4px 20px;
      border: 1px solid #d6cec0; width: 100%; max-width: 480px; position: relative;
      align-items: center;
    }
    .search-box i { align-self: center; margin-top: 2px; }
    .search-box input {
      border: none; background: transparent; padding: 10px 8px; font-size: 0.95rem;
      width: 100%; outline: none;
    }
    .search-box button {
      background: #3a5a3a; border: none; color: white; padding: 8px 22px;
      border-radius: 60px; font-weight: 500; cursor: pointer;
      white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .search-box button:hover { background: #2a472a; }
    .search-suggestions {
      position: absolute; top: 100%; left: 0; right: 0; background: white;
      border: 1px solid #d6cec0; border-radius: 20px; margin-top: 4px;
      max-height: 200px; overflow-y: auto; z-index: 100;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12); display: none;
    }
    .search-suggestions.show { display: block; }
    .search-suggestions .suggestion-item {
      padding: 8px 20px; cursor: pointer; border-bottom: 1px solid #f0ede8;
      display: flex; align-items: center; gap: 10px;
    }
    .search-suggestions .suggestion-item:hover { background: #f0ede8; }
    .search-suggestions .suggestion-item .s-name { font-weight: 500; }
    .search-suggestions .suggestion-item .s-sub { font-size: 0.8rem; color: #7a8a77; }

    .stats-row {
      display: flex; flex-wrap: wrap; gap: 12px 20px; background: #f8f5f0;
      border-radius: 24px; padding: 12px 20px; margin-bottom: 16px;
      border: 1px solid #e3dbcf;
    }
    .stats-row .stat-item {
      display: flex; align-items: baseline; gap: 4px; font-size: 0.9rem; color: #3a4a38;
    }
    .stats-row .stat-item .num { font-weight: 700; font-size: 1.1rem; color: #1f3a1f; }
    .stats-row .stat-item .label { color: #6a7a66; }

    .filter-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      padding: 8px 0 12px 0;
      border-bottom: 1px solid #f0ede8;
      margin-bottom: 16px;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-group .label {
      font-size: 0.85rem;
      color: #5a6a56;
      font-weight: 500;
    }
    .filter-group .btn {
      font-size: 0.8rem;
      padding: 4px 14px;
      border-radius: 40px;
      background: #f0ede8;
      border: 1px solid #e0d8cc;
      color: #5a6a56;
      cursor: pointer;
      transition: 0.1s;
    }
    .filter-group .btn:hover {
      background: #e3dbcf;
    }
    .filter-group .btn.active {
      background: #3a5a3a;
      color: white;
      border-color: #2d4a2d;
    }
    .filter-group .btn i { margin-right: 4px; }

    .org-section {
      margin-bottom: 22px; border-bottom: 1px dashed #d6cec0; padding-bottom: 12px;
    }
    .org-title {
      font-weight: 700; color: #2d462b; font-size: 1.2rem; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .org-title i { color: #5f825c; }
    .org-title .count-badge {
      font-size: 0.8rem; font-weight: 400; color: #6a7a66;
      background: #f0ede8; padding: 0 12px; border-radius: 40px;
    }
    .org-title .passing-date {
      font-size: 0.85rem; font-weight: 400; color: #8a7a6a;
      background: #f3efe9; padding: 2px 14px; border-radius: 40px;
    }
    .panda-list { display: flex; flex-wrap: wrap; gap: 6px 12px; }

    .panda-link {
      cursor: pointer; color: #1f3a1f; background: #f3efe9; padding: 5px 16px;
      border-radius: 40px; font-weight: 500; border: 1px solid #dbd2c4;
      transition: 0.1s; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 4px;
    }
    .panda-link:hover { background: #d9d0c0; border-color: #9b8b77; }
    .panda-link .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 2px;
      flex-shrink: 0;
    }
    .panda-link .status-dot.complete { background: #2d8a4e; }
    .panda-link .status-dot.incomplete { background: #d4a030; }
    .panda-link .gender-tag {
      font-size: 0.65rem; font-weight: 600; padding: 0 6px; border-radius: 20px;
      background: #d9d0c0; color: #4a5a48;
    }
    .panda-link .gender-tag.female { background: #f5d6d6; color: #a05050; }
    .panda-link .gender-tag.male { background: #d0ddf5; color: #406090; }
    .panda-link.pandastar { background: #f0e6d8; border-color: #c4a88a; }
    .panda-link.pandastar:hover { background: #e0d0bc; }

    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px;
      margin: 16px 0 8px;
    }
    .result-card {
      background: #faf8f5; border-radius: 24px; padding: 14px 18px;
      border: 1px solid #e3dbcf; cursor: pointer; transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-card:hover { background: #f0ebe2; border-color: #b9ae9a; }
    .result-card .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .result-card .status-dot.complete { background: #2d8a4e; }
    .result-card .status-dot.incomplete { background: #d4a030; }
    .result-card .name {
      font-weight: 700; font-size: 1.2rem; color: #1f3a1f;
    }
    .result-card .alias-text {
      font-size: 0.85rem;
      color: #8a9a86;
      font-weight: 400;
      margin-left: 4px;
    }
    .result-card .sub { color: #5b7058; font-size: 0.9rem; margin-top: 4px; }
    .result-card .gender-badge {
      display: inline-block; background: #d9d0c0; padding: 0 12px; border-radius: 40px;
      font-size: 0.75rem; margin-left: 8px;
    }
    .result-card .gender-badge.female { background: #f5d6d6; color: #a05050; }
    .result-card .gender-badge.male { background: #d0ddf5; color: #406090; }

    .empty-state { color: #6b7a66; padding: 24px 8px; text-align: center; font-style: italic; }
    .import-label { cursor: pointer; }
    .import-label input[type="file"] { display: none; }

    .page-view .page-header {
      display: flex; align-items: center; padding: 4px 0 16px 0;
      border-bottom: 1px solid #f0ede8; margin-bottom: 16px; gap: 12px;
    }
    .page-view .page-header .back-btn {
      background: none; border: none; font-size: 1.1rem; color: #5a6a56;
      cursor: pointer; padding: 4px 8px 4px 0; display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .page-view .page-header .back-btn:hover { color: #2d462b; }
    .page-view .page-header .page-title {
      font-size: 1.5rem; font-weight: 700; color: #1f3a1f;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .detail-header {
      display: flex;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 8px;
    }
    .detail-header .panda-name {
      font-size: 2rem;
      font-weight: 700;
      color: #1f3a1f;
      line-height: 1.2;
    }
    .detail-header .panda-alias {
      font-size: 1rem;
      color: #8a9a86;
      font-weight: 400;
    }
    .detail-header .panda-age {
      font-size: 0.95rem;
      color: #5a6a56;
      padding-bottom: 2px;
    }

    .detail-info-list {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .life-events-section {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .detail-relations {
      margin-bottom: 16px;
    }
    .detail-relation-group {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 6px 4px 4px 4px;
      margin-bottom: 8px;
      border: 1px solid #e3dbcf;
    }
    .detail-relation-group:last-child {
      margin-bottom: 0;
    }

    .detail-relations .empty-state {
      margin-bottom: 0;
    }

    .detail-info-item {
      display: flex;
      padding: 4px 0;
      border-bottom: 1px solid #eeebe5;
      font-size: 0.95rem;
    }
    .detail-info-item:last-child { border-bottom: none; }
    .detail-info-item .label {
      color: #5a6a56;
      min-width: 72px;
      font-weight: 500;
      flex-shrink: 0;
      text-align: left;
    }
    .detail-info-item .value {
      color: #1f2a1d;
      font-weight: 500;
      word-break: break-word;
      flex: 1;
    }
    .detail-info-item .value .age-tag {
      display: inline-block;
      background: #d4e0d0;
      color: #1f3a1f;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-left: 8px;
    }
    .detail-info-item .value .gender-badge {
      background: #d9d0c0;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .detail-info-item .value .status-badge {
      display: inline-block;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .detail-info-item .value .status-badge.complete {
      background: #d4e8d4;
      color: #1a5a2a;
    }
    .detail-info-item .value .status-badge.incomplete {
      background: #f5edd4;
      color: #8a7020;
    }

    .life-events-section .section-title {
      font-weight: 600;
      font-size: 1rem;
      color: #2d462b;
      margin-bottom: 8px;
    }
    .life-events-section .event-item {
      display: flex;
      align-items: baseline;
      padding: 3px 0;
      border-bottom: 1px solid #eeebe5;
      font-size: 0.9rem;
    }
    .life-events-section .event-item:last-child {
      border-bottom: none;
    }
    .life-events-section .event-item .event-date {
      color: #6a7a66;
      min-width: 100px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .life-events-section .event-item .event-text {
      color: #1f2a1d;
    }

    .detail-relation-group .group-title {
      padding: 2px 14px;
      background: #eae3d8;
      border-radius: 40px;
      display: inline-block;
      font-weight: 600;
      font-size: 0.8rem;
      color: #364d34;
      margin-left: 10px;
      margin-bottom: 2px;
    }
    .detail-relation-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      padding: 4px 12px 10px 12px;
    }
    .detail-relation-chip {
      background: #f2eee8;
      border-radius: 40px;
      padding: 4px 14px;
      font-weight: 500;
      border: 1px solid #cfc4b2;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
    }
    .detail-relation-chip:hover { background: #d9d0c0; border-color: #9b8b77; }
    .detail-relation-chip .chip-alias {
      font-weight: 400;
      color: #8a9a86;
      font-size: 0.75rem;
    }
    .detail-relation-chip.wild {
      background: #e8e8e0;
      color: #8a8a7a;
      border-color: #d0d0c8;
      cursor: default;
    }
    .detail-relation-chip.wild:hover {
      background: #e8e8e0;
      border-color: #d0d0c8;
    }
    .detail-relation-chip.unlinked {
      background: #f5f0ea;
      color: #9a8a7a;
      border-color: #d8d0c8;
      cursor: default;
      font-style: italic;
    }
    .detail-relation-chip.unlinked:hover {
      background: #f5f0ea;
      border-color: #d8d0c8;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0ede8;
      align-items: center;
    }
    .detail-actions .btn { min-width: 70px; justify-content: center; }
    .detail-actions .btn-left {
      margin-right: auto;
    }

    /* ===== 编辑页样式 ===== */
    .edit-form .form-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px; margin-bottom: 10px;
    }
    .edit-form .form-row label {
      font-weight: 500; color: #2f402d; min-width: 56px; font-size: 0.9rem;
    }
    .edit-form .form-row label .required { color: #b33c3c; }
    .edit-form .form-row input,
    .edit-form .form-row select {
      flex: 1; min-width: 100px; padding: 8px 14px; border-radius: 40px;
      border: 1px solid #cdc0ae; background: white; font-size: 0.9rem; outline: none;
    }
    .edit-form .form-row input:focus,
    .edit-form .form-row select:focus {
      outline: 2px solid #5f825c; border-color: transparent;
    }

    .life-events-edit {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0ede8;
    }
    .life-events-edit .events-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: #2d462b;
      margin-bottom: 8px;
    }
    .life-events-edit .event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #f5f0ea;
      font-size: 0.9rem;
    }
    .life-events-edit .event-row .event-date {
      color: #6a7a66;
      min-width: 100px;
      flex-shrink: 0;
    }
    .life-events-edit .event-row .event-text {
      flex: 1;
      color: #1f2a1d;
    }
    .life-events-edit .event-row .del-event-btn {
      background: none;
      border: none;
      color: #c0a8a0;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      transition: 0.1s;
    }
    .life-events-edit .event-row .del-event-btn:hover {
      color: #b33c3c;
    }
    .life-events-edit .add-event-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .life-events-edit .add-event-row input[type="date"] {
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px solid #cdc0ae;
      background: white;
      font-size: 0.85rem;
      outline: none;
      min-width: 120px;
    }
    .life-events-edit .add-event-row input[type="date"]:focus {
      outline: 2px solid #5f825c;
      border-color: transparent;
    }
    .life-events-edit .add-event-row input[type="text"] {
      flex: 1;
      min-width: 120px;
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid #cdc0ae;
      background: white;
      font-size: 0.85rem;
      outline: none;
    }
    .life-events-edit .add-event-row input[type="text"]:focus {
      outline: 2px solid #5f825c;
      border-color: transparent;
    }
    .life-events-edit .add-event-row .add-event-btn {
      padding: 6px 16px;
      border-radius: 40px;
      border: none;
      background: #3a5a3a;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .life-events-edit .add-event-row .add-event-btn:hover {
      background: #2d4a2d;
    }
    .life-events-edit .empty-events-edit {
      color: #8a9a86;
      font-style: italic;
      font-size: 0.85rem;
      padding: 4px 0;
    }

    .complete-toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 4px 0;
      margin-bottom: 4px;
    }
    .complete-toggle-row .toggle-label {
      font-weight: 500;
      color: #2f402d;
      font-size: 0.9rem;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #d0c8bc;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch.active {
      background: #2d8a4e;
    }
    .toggle-switch .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .toggle-switch.active .toggle-knob {
      left: 22px;
    }
    .toggle-status-text {
      font-size: 0.85rem;
      color: #5a6a56;
    }
    .toggle-status-text.complete { color: #2d8a4e; font-weight: 500; }
    .toggle-status-text.incomplete { color: #d4a030; font-weight: 500; }

    /* ===== custom-suggest (机构/所在地/母亲/父亲 统一使用) ===== */
    .custom-suggest {
      position: relative;
      flex: 1;
      min-width: 100px;
    }
    .custom-suggest input {
      width: 100%;
      padding: 8px 14px;
      border-radius: 40px;
      border: 1px solid #cdc0ae;
      background: white;
      font-size: 0.9rem;
      outline: none;
    }
    .custom-suggest input:focus {
      outline: 2px solid #5f825c;
      border-color: transparent;
    }
    .custom-suggest .suggest-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #cdc0ae;
      border-radius: 16px;
      margin-top: 4px;
      max-height: 150px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);

<script>
(function(){
  // ================================================================
  // 数据层
  // ================================================================
  const STORAGE_KEY = 'pandaAppData';
  let currentGroupMode = 'org';
  let currentFilter = 'all';
  let currentPandaId = null;
  let editPandaId = null;
  let detailHistory = [];

  function migrateAlias(panda) {
    if (!panda) return;
    if (panda.alias !== undefined && panda.alias !== null) return;
    const match = panda.name.match(/^(.+)（(.+)）$/);
    if (match) {
      panda.name = match[1].trim();
      panda.alias = match[2].trim();
    } else {
      panda.alias = '';
    }
  }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const data = JSON.parse(stored);
        if (Array.isArray(data) && data.length > 0) {
          data.forEach(p => {
            migrateAlias(p);
            if (p.isComplete === undefined) p.isComplete = false;
            if (p.motherId === undefined) p.motherId = '';
            if (p.fatherId === undefined) p.fatherId = '';
            if (p.lifeEvents === undefined) p.lifeEvents = [];
          });
          return data;
        }
      } catch (e) {}
    }
    return [
      { id: 'p1', name: '花花', gender: '雌性', birthday: '2020-07-04', org: '成都大熊猫繁育研究基地', location: '', mother: '成功', father: '美兰', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p2', name: '和叶', gender: '雌性', birthday: '2020-07-04', org: '成都大熊猫繁育研究基地', location: '', mother: '成功', father: '美兰', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p3', name: '萌兰', gender: '雄性', birthday: '2015-07-04', org: '北京动物园', location: '北京', mother: '萌萌', father: '美兰', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p4', name: '美兰', gender: '雄性', birthday: '2006-09-06', org: '成都大熊猫繁育研究基地', location: '', mother: '伦伦', father: '洋洋', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p5', name: '成功', gender: '雌性', birthday: '2000-08-01', org: '成都大熊猫繁育研究基地', location: '潘达星', mother: '成成', father: '安安', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
    ];
  }

  let pandas = loadData();
  let nextId = 100;
  const ids = pandas.map(p => { const n = parseInt(String(p.id).replace('p','')); return isNaN(n)?0:n; });
  nextId = (ids.length ? Math.max(...ids) : 0) + 1;

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pandas));
      document.getElementById('storageStatus').textContent = `💾 ${pandas.length} 条数据已保存`;
    } catch (e) {
      document.getElementById('storageStatus').textContent = '⚠️ 保存失败';
    }
  }

  // ================================================================
  // DOM 引用
  // ================================================================
  const pageHome = document.getElementById('pageHome');
  const pageDetail = document.getElementById('pageDetail');
  const pageEdit = document.getElementById('pageEdit');
  const pageTree = document.getElementById('pageTree');
  const homeTitle = document.getElementById('homeTitle');

  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const searchSuggestions = document.getElementById('searchSuggestions');
  const browseContainer = document.getElementById('browseContainer');
  const exportBtn = document.getElementById('exportBtn');
  const importInput = document.getElementById('importInput');
  const addNewBtn = document.getElementById('addNewBtn');
  const groupByOrgBtn = document.getElementById('groupByOrgBtn');
  const groupByLocationBtn = document.getElementById('groupByLocationBtn');
  const filterAllBtn = document.getElementById('filterAllBtn');
  const filterCompleteBtn = document.getElementById('filterCompleteBtn');
  const filterIncompleteBtn = document.getElementById('filterIncompleteBtn');
  const filterBirthdayBtn = document.getElementById('filterBirthdayBtn');

  const detailTitle = document.getElementById('detailTitle');
  const detailBody = document.getElementById('detailBody');
  const editBackBtn = document.getElementById('editBackBtn');
  const editTitle = document.getElementById('editTitle');
  const editBody = document.getElementById('editBody');
  const treeBackBtn = document.getElementById('treeBackBtn');
  const treeTitle = document.getElementById('treeTitle');
  const treeBody = document.getElementById('treeBody');

  const totalCount = document.getElementById('totalCount');
  const maleCount = document.getElementById('maleCount');
  const femaleCount = document.getElementById('femaleCount');
  const orgCount = document.getElementById('orgCount');
  const completeCount = document.getElementById('completeCount');
  const incompleteCount = document.getElementById('incompleteCount');
  const birthdayCount = document.getElementById('birthdayCount');

  // ================================================================
  // 核心函数
  // ================================================================
  function getDisplayName(panda) {
    if (!panda) return '';
    if (panda.alias) return panda.name + '（' + panda.alias + '）';
    return panda.name;
  }

  function findPandaByName(name) {
    if (!name || name.trim() === '') return null;
    return pandas.find(p => p.name.trim().toLowerCase() === name.trim().toLowerCase());
  }
  function getPandaById(id) {
    if (!id || id === '') return null;
    return pandas.find(p => p.id === id);
  }

  function isWild(value) {
    if (!value) return true;
    const v = value.trim();
    return v === '野外' || v === '野外 ' || v === '野 外';
  }

  function getAllPandaOptions() {
    return pandas.map(p => ({
      id: p.id,
      name: p.name,
      alias: p.alias || '',
      display: getDisplayName(p)
    })).sort((a, b) => a.name.localeCompare(b.name));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const isStandard = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(dateStr);
    if (!isStandard) return dateStr;
    try {
      return new Date(dateStr).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
    } catch { return dateStr; }
  }

  function calcAge(birthdayStr) {
    if (!birthdayStr || birthdayStr.trim() === '') return null;
    const isStandard = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(birthdayStr);
    if (!isStandard) return null;
    let year = null, month = null, day = null;
    const cleaned = birthdayStr.replace(/\s+/g, '');
    let match = cleaned.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if (match) { year = parseInt(match[1]); month = parseInt(match[2])-1; day = parseInt(match[3]); }
    if (!match) {
      try { const d = new Date(birthdayStr);
        if (!isNaN(d.getTime())) { year = d.getFullYear(); month = d.getMonth(); day = d.getDate(); } } catch(e) {} }
    if (year === null || isNaN(year)) return null;
    if (month === null || isNaN(month)) month = 5;
    if (day === null || isNaN(day)) day = 30;
    month = Math.max(0, Math.min(11, month));
    day = Math.max(1, Math.min(30, day));
    const birth = new Date(year, month, day);
    if (isNaN(birth.getTime())) return null;
    const now = new Date();
    let years = now.getFullYear() - birth.getFullYear();
    let months = now.getMonth() - birth.getMonth();
    if (months < 0) { years--; months += 12; }
    if (years < 0) return null;
    if (years === 0 && months === 0) return '不到1个月';
    let parts = [];
    if (years > 0) parts.push(years + '岁');
    if (months > 0) parts.push(months + '个月');
    return parts.join('') || (years + '岁');
  }

  function isTodayBirthday(birthdayStr) {
    if (!birthdayStr) return false;
    const isStandard = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(birthdayStr);
    if (!isStandard) return false;
    try {
      const d = new Date(birthdayStr);
      if (isNaN(d.getTime())) return false;
      const today = new Date();
      return d.getMonth() === today.getMonth() && d.getDate() === today.getDate();
    } catch { return false; }
  }

  function getRelationships(panda) {
    if (!panda) return { parents:[], siblingsSameParents:[], siblingsSameMother:[], siblingsSameFather:[], children:[], spouse:[] };
    const name = panda.name;
    let motherPanda = null;
    let fatherPanda = null;
    let motherName = '';
    let fatherName = '';

    if (panda.motherId) motherPanda = getPandaById(panda.motherId);
    if (!motherPanda && panda.mother && !isWild(panda.mother)) motherPanda = findPandaByName(panda.mother);
    if (motherPanda) motherName = motherPanda.name;

    if (panda.fatherId) fatherPanda = getPandaById(panda.fatherId);
    if (!fatherPanda && panda.father && !isWild(panda.father)) fatherPanda = findPandaByName(panda.father);
    if (fatherPanda) fatherName = fatherPanda.name;

    const parents = [];
    if (panda.mother && isWild(panda.mother)) {
      parents.push({ id: 'wild_mother', name: '🌿 野外', isWild: true });
    } else if (motherPanda) {
      parents.push({ ...motherPanda, isWild: false });
    } else if (panda.mother && panda.mother.trim() !== '') {
      parents.push({ id: 'unlinked_mother', name: panda.mother + ' (未关联)', isWild: false, unlinked: true });
    }
    if (panda.father && isWild(panda.father)) {
      parents.push({ id: 'wild_father', name: '🌿 野外', isWild: true });
    } else if (fatherPanda) {
      parents.push({ ...fatherPanda, isWild: false });
    } else if (panda.father && panda.father.trim() !== '') {
      parents.push({ id: 'unlinked_father', name: panda.father + ' (未关联)', isWild: false, unlinked: true });
    }

    const children = pandas.filter(p => {
      if (p.id === panda.id) return false;
      if (p.motherId && p.motherId === panda.id) return true;
      if (p.fatherId && p.fatherId === panda.id) return true;
      if (!p.motherId && p.mother && p.mother.trim() === name) return true;
      if (!p.fatherId && p.father && p.father.trim() === name) return true;
      return false;
    });

    const siblingsSameParents = [], siblingsSameMother = [], siblingsSameFather = [];
    pandas.forEach(p => {
      if (p.id === panda.id) return;
      let pMother = null, pFather = null;
      if (p.motherId) pMother = getPandaById(p.motherId);
      if (!pMother && p.mother && !isWild(p.mother)) pMother = findPandaByName(p.mother);
      if (p.fatherId) pFather = getPandaById(p.fatherId);
      if (!pFather && p.father && !isWild(p.father)) pFather = findPandaByName(p.father);
      const sameMother = motherPanda && pMother && motherPanda.id === pMother.id;
      const sameFather = fatherPanda && pFather && fatherPanda.id === pFather.id;
      if (sameMother && sameFather) siblingsSameParents.push(p);
      else if (sameMother && !sameFather) siblingsSameMother.push(p);
      else if (sameFather && !sameMother) siblingsSameFather.push(p);
    });

    const spouse = [];
    const myChildrenIds = children.map(c => c.id);
    pandas.forEach(p => {
      if (p.id === panda.id) return;
      if (parents.some(par => par.id === p.id)) return;
      if (children.some(child => child.id === p.id)) return;
      const pChildren = pandas.filter(c => {
        if (c.motherId && c.motherId === p.id) return true;
        if (c.fatherId && c.fatherId === p.id) return true;
        if (!c.motherId && c.mother && c.mother.trim() === p.name) return true;
        if (!c.fatherId && c.father && c.father.trim() === p.name) return true;
        return false;
      });
      if (pChildren.some(c => myChildrenIds.includes(c.id))) spouse.push(p);
    });

    return { parents, siblingsSameParents, siblingsSameMother, siblingsSameFather, children, spouse };
  }

  function getDistinctValues(field) {
    const values = new Set();
    pandas.forEach(p => {
      const v = p[field] || '';
      if (v.trim()) values.add(v.trim());
    });
    return Array.from(values).sort();
  }

  function updateStats() {
    const total = pandas.length;
    const male = pandas.filter(p => p.gender === '雄性').length;
    const female = pandas.filter(p => p.gender === '雌性').length;
    const orgs = new Set(pandas.map(p => p.org || '未归类'));
    const complete = pandas.filter(p => p.isComplete === true).length;
    const incomplete = total - complete;
    const birthday = pandas.filter(p => isTodayBirthday(p.birthday)).length;
    totalCount.textContent = total;
    maleCount.textContent = male;
    femaleCount.textContent = female;
    orgCount.textContent = orgs.size;
    completeCount.textContent = complete;
    incompleteCount.textContent = incomplete;
    birthdayCount.textContent = birthday;
  }

  function showPage(pageId) {
    document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0, 0);
  }

  // ================================================================
  // 主页
  // ================================================================
  function renderBrowse() {
    const pandastarList = [];
    const normalMap = new Map();

    let filteredPandas = pandas;
    if (currentFilter === 'complete') {
      filteredPandas = pandas.filter(p => p.isComplete === true);
    } else if (currentFilter === 'incomplete') {
      filteredPandas = pandas.filter(p => p.isComplete !== true);
    } else if (currentFilter === 'birthday') {
      filteredPandas = pandas.filter(p => isTodayBirthday(p.birthday));
    }

    filteredPandas.forEach(p => {
      if (p.location && p.location.trim() === '潘达星') {
        pandastarList.push(p);
      } else {
        const key = currentGroupMode === 'org' ? (p.org || '未归类') : (p.location || '未知所在地');
        if (!normalMap.has(key)) normalMap.set(key, []);
        normalMap.get(key).push(p);
      }
    });

    let html = '';
    const sortedKeys = Array.from(normalMap.keys()).sort();
    for (let key of sortedKeys) {
      const list = normalMap.get(key);
      const icon = currentGroupMode === 'org' ? 'fa-building' : 'fa-map-pin';
      html += `<div class="org-section"><div class="org-title">
        <i class="fas ${icon}"></i> ${key} <span class="count-badge">${list.length}只</span>
      </div><div class="panda-list">`;
      list.sort((a,b)=> a.name.localeCompare(b.name));
      list.forEach(p => {
        const cls = p.gender === '雌性' ? 'female' : (p.gender === '雄性' ? 'male' : '');
        const tag = p.gender ? (p.gender === '雌性' ? '♀' : (p.gender === '雄性' ? '♂' : '')) : '';
        const displayName = getDisplayName(p);
        const dotClass = p.isComplete ? 'complete' : 'incomplete';
        html += `<span class="panda-link" data-id="${p.id}">
          <span class="status-dot ${dotClass}"></span>
          ${displayName}
          ${tag ? `<span class="gender-tag ${cls}">${tag}</span>` : ''}
        </span>`;
      });
      html += '</div></div>';
    }

    if (pandastarList.length) {
      const dates = pandastarList.filter(p => p.passingDate).map(p => p.passingDate);
      let display = '';
      if (dates.length) {
        const sorted = dates.slice().sort();
        display = '🕊️ ' + sorted[0] + ' 〜 ' + sorted[sorted.length-1];
      }
      html += `<div class="org-section"><div class="org-title">
        <i class="fas fa-star" style="color:#d4a373;"></i> 潘达星 ✨ <span class="count-badge">${pandastarList.length}只</span>
        ${display ? `<span class="passing-date">${display}</span>` : ''}
      </div><div class="panda-list">`;
      pandastarList.sort((a,b)=> a.name.localeCompare(b.name));
      pandastarList.forEach(p => {
        const cls = p.gender === '雌性' ? 'female' : (p.gender === '雄性' ? 'male' : '');
        const tag = p.gender ? (p.gender === '雌性' ? '♀' : (p.gender === '雄性' ? '♂' : '')) : '';
        const displayName = getDisplayName(p);
        const dotClass = p.isComplete ? 'complete' : 'incomplete';
        html += `<span class="panda-link pandastar" data-id="${p.id}">
          <span class="status-dot ${dotClass}"></span>
          ${displayName}
          ${tag ? `<span class="gender-tag ${cls}">${tag}</span>` : ''}
        </span>`;
      });
      html += '</div></div>';
    }

    if (!html) {
      let msg = '暂无熊猫数据';
      if (currentFilter === 'complete') msg = '没有已完善的熊猫';
      else if (currentFilter === 'incomplete') msg = '没有待补充的熊猫';

  // ================================================================
  // 搜索
  // ================================================================
  function updateSuggestions(keyword) {
    if (!keyword || keyword.length < 1) { searchSuggestions.classList.remove('show'); return; }
    const kw = keyword.toLowerCase();
    const results = pandas.filter(p => {
      const nameMatch = p.name.toLowerCase().includes(kw);
      const aliasMatch = p.alias && p.alias.toLowerCase().includes(kw);
      const orgMatch = p.org && p.org.toLowerCase().includes(kw);
      const locMatch = p.location && p.location.toLowerCase().includes(kw);
      return nameMatch || aliasMatch || orgMatch || locMatch;
    }).slice(0, 8);
    if (results.length === 0) { searchSuggestions.classList.remove('show'); return; }
    let html = '';
    results.forEach(p => {
      const displayName = getDisplayName(p);
      const dotClass = p.isComplete ? 'complete' : 'incomplete';
      html += `<div class="suggestion-item" data-id="${p.id}">
        <span class="s-name"><span class="status-dot ${dotClass}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;"></span>${displayName}</span>
        <span class="s-sub">${p.org||'—'} · ${p.location||'—'}</span>
      </div>`;
    });
    searchSuggestions.innerHTML = html;
    searchSuggestions.classList.add('show');
    searchSuggestions.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) { searchInput.value = p.name; searchSuggestions.classList.remove('show'); doSearch(); }
      });
    });
  }

  function doSearch() {
    const keyword = searchInput.value.trim();
    searchSuggestions.classList.remove('show');
    if (!keyword) { renderBrowse(); return; }
    const kw = keyword.toLowerCase();
    const results = pandas.filter(p => {
      const nameMatch = p.name.toLowerCase().includes(kw);
      const aliasMatch = p.alias && p.alias.toLowerCase().includes(kw);
      const orgMatch = p.org && p.org.toLowerCase().includes(kw);
      const locMatch = p.location && p.location.toLowerCase().includes(kw);
      return nameMatch || aliasMatch || orgMatch || locMatch;
    });
    if (results.length === 0) {
      browseContainer.innerHTML = '<div class="empty-state" style="padding:30px 8px;">未找到 “' + keyword + '”</div>';
      return;
    }
    let html = '<div class="result-grid">';
    results.forEach(p => {
      const cls = p.gender === '雌性' ? 'female' : (p.gender === '雄性' ? 'male' : '');
      const displayName = getDisplayName(p);
      const dotClass = p.isComplete ? 'complete' : 'incomplete';
      html += `<div class="result-card" data-id="${p.id}">
        <span class="status-dot ${dotClass}"></span>
        <div>
          <div class="name">${displayName} <span class="gender-badge ${cls}">${p.gender||'未知'}</span></div>
          <div class="sub">${p.org||'—'} · ${p.location||'—'}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    browseContainer.innerHTML = html;
    document.querySelectorAll('.result-card[data-id]').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) openDetail(p.id);
      });
    });
  }

  // ================================================================
  // 族谱
  // ================================================================
  function buildFamilyTree(panda, visited = new Set()) {
    if (!panda) return null;
    if (visited.has(panda.id)) {
      return { ...panda, _cycle: true };
    }
    const newVisited = new Set(visited);
    newVisited.add(panda.id);

    let mother = null, father = null;
    if (panda.motherId) {
      const m = getPandaById(panda.motherId);
      if (m) mother = buildFamilyTree(m, newVisited);
    }
    if (!mother && panda.mother && !isWild(panda.mother)) {
      const m = findPandaByName(panda.mother);
      if (m) mother = buildFamilyTree(m, newVisited);
    }
    if (!mother && panda.mother && isWild(panda.mother)) {
      mother = { id: 'wild_mother_' + panda.id, name: '🌿 野外', isWild: true, _isWild: true };
    }

    if (panda.fatherId) {
      const f = getPandaById(panda.fatherId);
      if (f) father = buildFamilyTree(f, newVisited);
    }
    if (!father && panda.father && !isWild(panda.father)) {
      const f = findPandaByName(panda.father);
      if (f) father = buildFamilyTree(f, newVisited);
    }
    if (!father && panda.father && isWild(panda.father)) {
      father = { id: 'wild_father_' + panda.id, name: '🌿 野外', isWild: true, _isWild: true };
    }

    return { ...panda, mother, father, _cycle: false };
  }

  function renderTreeNode(node, depth = 0) {
    if (!node) return '';
    if (node._isWild) {
      return `
        <div class="tree-node">
          <div class="node-card wild-card">
            <div class="node-name wild-text">${node.name}</div>
          </div>
        </div>
      `;
    }
    if (node._cycle) {
      return `
        <div class="tree-node">
          <div class="node-card" style="border-color:#d4a373;background:#faf0e8;">
            <div class="node-name">🔄 ${node.name}</div>
            <div class="node-gender">循环引用</div>
          </div>
        </div>
      `;
    }

    const hasMother = node.mother !== null && node.mother !== undefined;
    const hasFather = node.father !== null && node.father !== undefined;
    const hasChildren = hasMother || hasFather;

    let genderDisplay = node.gender || '未知';
    let genderIcon = genderDisplay === '雌性' ? '♀' : (genderDisplay === '雄性' ? '♂' : '');
    let aliasDisplay = node.alias ? '（' + node.alias + '）' : '';

    let cardClass = 'node-card';
    if (depth === 0) cardClass += ' tree-root-card';

    let html = `
      <div class="tree-node">
        <div class="${cardClass}" data-id="${node.id}" data-wild="false">
          <div class="node-name">${node.name}<span class="node-alias">${aliasDisplay}</span></div>
          <div class="node-gender">${genderIcon} ${genderDisplay}</div>
        </div>
    `;

    if (hasChildren) {
      html += `
        <div class="tree-connector">
          <div class="line-down"></div>
          <div class="line-branch">
            <div class="branch-left"></div>
            <div class="branch-center"></div>
            <div class="branch-right"></div>
          </div>
        </div>
        <div class="tree-children">
      `;
      if (hasMother) {
        html += `<div class="tree-child-wrapper">${renderTreeNode(node.mother, depth + 1)}</div>`;
      }
      if (hasFather) {
        html += `<div class="tree-child-wrapper">${renderTreeNode(node.father, depth + 1)}</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
    return html;
  }

  function openTree(pandaId) {
    const p = getPandaById(pandaId);
    if (!p) return;
    const displayName = getDisplayName(p);
    treeTitle.textContent = '🌳 ' + displayName + ' 的族谱';

    const tree = buildFamilyTree(p);
    if (!tree) {
      treeBody.innerHTML = '<div class="empty-state">无法构建族谱</div>';
      showPage('pageTree');
      return;
    }

    let html = `<div class="tree-container"><div class="tree-root">`;
    html += renderTreeNode(tree);
    html += `</div></div>`;

    html += `
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid #f0ede8;font-size:0.7rem;color:#8a9a86;display:flex;flex-wrap:wrap;gap:10px;">
        <span>🌿 野外（终止节点）</span>
        <span>🔄 循环引用</span>
        <span style="display:inline-flex;align-items:center;gap:4px;"><span style="display:inline-block;width:14px;height:14px;border-radius:4px;background:#e8e0d4;border:2px solid #b9ae9a;"></span> 当前熊猫</span>
        <span>⬇️ 长辈在上</span>
      </div>
    `;

    treeBody.innerHTML = html;

    treeBody.querySelectorAll('.node-card:not(.wild-card)').forEach(el => {
      el.addEventListener('click', function() {
        const id = this.dataset.id;
        if (id && !id.startsWith('wild_')) {
          const target = getPandaById(id);
          if (target) {
            openDetail(target.id);
          }
        }
      });
    });

    showPage('pageTree');
    window.scrollTo(0, 0);
  }

  // ================================================================
  // 详情页
  // ================================================================
  function goBackDetail() {
    if (detailHistory.length > 0) {
      const prevId = detailHistory.pop();
      const prevPanda = getPandaById(prevId);
      if (prevPanda) {
        currentPandaId = prevId;
        renderDetail(prevPanda);
        return;
      }
    }
    detailHistory = [];
    showPage('pageHome');
  }

  function openDetail(pandaId) {
    if (document.getElementById('pageDetail').classList.contains('active')) {
      if (currentPandaId && currentPandaId !== pandaId) {
        detailHistory.push(currentPandaId);
      }
    } else {
      detailHistory = [];
    }
    currentPandaId = pandaId;
    const p = getPandaById(pandaId);
    if (!p) return;
    renderDetail(p);
    showPage('pageDetail');
    window.scrollTo(0, 0);
  }

  function renderDetail(p) {
    const rel = getRelationships(p);
    detailTitle.textContent = '';

    let ageStr = '';
    if (p.location && p.location.trim() !== '潘达星') {
      const age = calcAge(p.birthday);
      if (age) ageStr = age;
    }

    let infoHtml = `
      <div class="detail-info-list">
        <div class="detail-info-item"><span class="label">性别</span><span class="value"><span class="gender-badge">${genderDisplay}</span></span></div>
        <div class="detail-info-item"><span class="label">生日</span><span class="value">${birthdayDisplay}</span></div>
        <div class="detail-info-item"><span class="label">谱系号</span><span class="value">${pedigreeDisplay}</span></div>

        <div class="detail-info-item"><span class="label">所在地</span><span class="value">${locationDisplay}</span></div>

    }
    if (p.alias) {
      infoHtml += `<div class="detail-info-item"><span class="label">别名</span><span class="value">${p.alias}</span></div>`;
    }
    infoHtml += `
        <div class="detail-info-item"><span class="label">状态</span><span class="value"><span class="status-badge ${statusClass}">${statusLabel}</span></span></div>

      });

          <div class="group-title">👪 父母</div>
          <div class="detail-relation-list">
      `;
      rel.parents.forEach(par => {
        if (par.isWild) {
          parentsHtml += `<span class="detail-relation-chip wild">${par.name}</span>`;
        } else if (par.unlinked) {

        }
      });
      parentsHtml += `</div></div>`;

    if (rel.siblingsSameMother.length) siblingGroups.push({ label: '👩‍👧 同母', list: rel.siblingsSameMother });
    if (rel.siblingsSameFather.length) siblingGroups.push({ label: '👨‍👧 同父', list: rel.siblingsSameFather });

          if (target) openDetail(target.id);
        }
      });

  // ================================================================
  // 编辑页
  // ================================================================
  function createSuggestInputWithWildcard(containerId, options, inputId, initialValue, placeholder) {
    const container = document.getElementById(containerId);
    // 清空容器，防止重复
    container.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.className = 'custom-suggest';
    wrapper.innerHTML = `
      <input type="text" id="${inputId}" value="${initialValue || ''}" placeholder="${placeholder || '输入或选择'}" autocomplete="off" />
      <div class="suggest-dropdown" id="${inputId}_dropdown"></div>
    `;
    container.appendChild(wrapper);

    const input = wrapper.querySelector('input');
    const dropdown = wrapper.querySelector('.suggest-dropdown');

    // 过滤掉"野外"
    const filteredOptions = options.filter(o => o !== '野外');

    function renderDropdown(list) {
      if (!list || list.length === 0) {
        dropdown.innerHTML = `<div class="no-match">未找到匹配的熊猫</div>`;
        dropdown.classList.add('show');
        return;
      }
      dropdown.innerHTML = list.map(item =>
        `<div class="suggest-item" data-value="${item}">${item}</div>`
      ).join('');
      dropdown.classList.add('show');
      dropdown.querySelectorAll('.suggest-item').forEach(el => {
        el.addEventListener('click', function() {
          const value = this.dataset.value;
          input.value = value;
          // 查找对应的 ID
          const panda = findPandaByName(value);
          if (panda) input.dataset.selectedId = panda.id;
          dropdown.classList.remove('show');
          input.dispatchEvent(new Event('input'));
        });
      });
    }

    input.addEventListener('focus', function() {
      const val = this.value.trim();
      if (val && val !== '野外') {
        const kw = val.toLowerCase();
        const filtered = filteredOptions.filter(o => o.toLowerCase().includes(kw));
        renderDropdown(filtered);
      } else if (val === '野外') {
        dropdown.classList.remove('show');
      } else {
        renderDropdown(filteredOptions.slice(0, 10));
      }
    });

    input.addEventListener('input', function() {
      const val = this.value.trim();
      if (!val) {
        this.dataset.selectedId = '';
        dropdown.classList.remove('show');
        input.dispatchEvent(new Event('input'));
        return;
      }
      if (val === '野外') {
        this.dataset.selectedId = '';
        dropdown.classList.remove('show');
        input.dispatchEvent(new Event('input'));
        return;
      }
      const kw = val.toLowerCase();
      const filtered = filteredOptions.filter(o => o.toLowerCase().includes(kw));
      renderDropdown(filtered);
    });

    input.addEventListener('blur', function() {
      setTimeout(() => dropdown.classList.remove('show'), 200);
    });

    document.addEventListener('click', function(e) {
      if (!wrapper.contains(e.target)) dropdown.classList.remove('show');
    });

    // 如果初始值是"野外"，标记
    if (initialValue === '野外') {
      input.dataset.isWild = 'true';
    }

    return input;
  }

  function createSuggestInput(containerId, options, inputId, initialValue, placeholder) {
    const container = document.getElementById(containerId);
    const wrapper = document.createElement('div');
    wrapper.className = 'custom-suggest';
    wrapper.innerHTML = `
      <input type="text" id="${inputId}" value="${initialValue||''}" placeholder="${placeholder||'输入或选择'}" autocomplete="off" />
      <div class="suggest-dropdown" id="${inputId}_dropdown"></div>
    `;
    container.appendChild(wrapper);

    const input = wrapper.querySelector('input');
    const dropdown = wrapper.querySelector('.suggest-dropdown');

    function renderDropdown(list) {
      if (!list || list.length === 0) { dropdown.classList.remove('show'); return; }
      dropdown.innerHTML = list.map(item =>
        `<div class="suggest-item" data-value="${item}">${item}</div>`
      ).join('');
      dropdown.classList.add('show');
      dropdown.querySelectorAll('.suggest-item').forEach(el => {
        el.addEventListener('click', function() {
          input.value = this.dataset.value;
          dropdown.classList.remove('show');
          input.dispatchEvent(new Event('input'));
        });
      });
    }

    input.addEventListener('focus', function() {
      const val = this.value.trim().toLowerCase();
      const filtered = options.filter(o => o.toLowerCase().includes(val));
      renderDropdown(filtered);
    });

    input.addEventListener('input', function() {
      const val = this.value.trim().toLowerCase();
      const filtered = options.filter(o => o.toLowerCase().includes(val));
      renderDropdown(filtered);
    });

    input.addEventListener('blur', function() {
      setTimeout(() => dropdown.classList.remove('show'), 200);
    });

    document.addEventListener('click', function(e) {
      if (!wrapper.contains(e.target)) dropdown.classList.remove('show');
    });

    return input;
  }

  function openEdit(pandaId) {
    editPandaId = pandaId;
    const p = getPandaById(pandaId);
    if (!p) return;
    const isNew = (pandaId === 'temp_new');
    editTitle.textContent = isNew ? '📝 录入新熊猫' : '✏️ 编辑 ' + p.name;
    renderEditForm(p, isNew);
    showPage('pageEdit');
    window.scrollTo(0, 0);
  }

  function renderEditForm(p, isNew) {
    const orgOptions = getDistinctValues('org');
    const locOptions = getDistinctValues('location');
    const allPandaNames = getAllPandaOptions().map(o => o.name).filter(n => n !== '野外');

    const nameVal = isNew ? '' : p.name;
    const aliasVal = isNew ? '' : (p.alias || '');
    const genderVal = p.gender || '雌性';
    const birthdayVal = p.birthday || '';
    const orgVal = p.org || '';
    const locVal = p.location || '';
    const passingVal = p.passingDate || '';
    const pedigreeVal = p.pedigree || '';
    const showPassing = !isNew && (p.location && p.location.trim() === '潘达星');
    const isComplete = p.isComplete || false;
    const events = p.lifeEvents || [];

    let motherDisplay = '';
    let motherId = p.motherId || '';
    if (motherId) {
      const m = getPandaById(motherId);
      if (m) motherDisplay = getDisplayName(m);
    }
    if (!motherDisplay && p.mother && !isWild(p.mother)) {
      motherDisplay = p.mother;
    }
    if (p.mother && isWild(p.mother)) {
      motherDisplay = '野外';
    }

    let fatherDisplay = '';
    let fatherId = p.fatherId || '';
    if (fatherId) {
      const f = getPandaById(fatherId);
      if (f) fatherDisplay = getDisplayName(f);
    }
    if (!fatherDisplay && p.father && !isWild(p.father)) {
      fatherDisplay = p.father;
    }
    if (p.father && isWild(p.father)) {
      fatherDisplay = '野外';
    }

    let eventsHtml = '';
    if (events.length > 0) {
      const sorted = [...events].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      sorted.forEach((e, idx) => {
        const dateDisplay = e.date || '未知日期';
        eventsHtml += `
          <div class="event-row">
            <span class="event-date">${dateDisplay}</span>
            <span class="event-text">${e.event}</span>
            <button class="del-event-btn" data-index="${idx}" title="删除">×</button>
          </div>
        `;
      });
    } else {
      eventsHtml = `<div class="empty-events-edit">暂无记录</div>`;
    }

    let html = `
      <div class="edit-form">
        <div class="form-row">
          <label>名字 <span class="required">*</span></label>
          <input type="text" id="editName" value="${nameVal}" placeholder="如：花花" />
        </div>
        <div class="form-row">
          <label>别名</label>
          <input type="text" id="editAlias" value="${aliasVal}" placeholder="请输入熊猫的别名" />
        </div>
        <div class="form-row">
          <label>性别</label>
          <select id="editGender">
            <option value="雌性" ${genderVal==='雌性'?'selected':''}>雌性</option>
            <option value="雄性" ${genderVal==='雄性'?'selected':''}>雄性</option>
            <option value="未知" ${genderVal==='未知'?'selected':''}>未知</option>
          </select>
        </div>
        <div class="form-row">
          <label>生日</label>
          <input type="text" id="editBirthday" value="${birthdayVal}" placeholder="YYYY-MM-DD / YYYY-MM / YYYY" />
        </div>
        <div class="form-row">
          <label>谱系号</label>
          <input type="text" id="editPedigree" value="${pedigreeVal}" placeholder="如：1234" />
        </div>
        <div class="form-row">
          <label>机构</label>
          <div id="editOrgContainer" style="flex:1;min-width:100px;"></div>
        </div>
        <div class="form-row">
          <label>所在地</label>
          <div id="editLocContainer" style="flex:1;min-width:100px;"></div>
        </div>
    `;

    html += `
        <div class="form-row" id="editPassingRow" style="display:${showPassing ? 'flex' : 'none'};">
          <label>离世</label>
          <input type="date" id="editPassing" value="${passingVal}" />
        </div>
    `;

    html += `
        <div class="form-row">
          <label>母亲</label>
          <div id="editMotherContainer" style="flex:1;min-width:100px;"></div>
        </div>
        <div class="form-row">
          <label>父亲</label>
          <div id="editFatherContainer" style="flex:1;min-width:100px;"></div>
        </div>

        <div class="complete-toggle-row">
          <span class="toggle-label">信息已完善</span>
          <div class="toggle-switch ${isComplete ? 'active' : ''}" id="completeToggle">
            <div class="toggle-knob"></div>
          </div>
          <span class="toggle-status-text ${isComplete ? 'complete' : 'incomplete'}" id="completeStatusText">
            ${isComplete ? '✅ 已完善' : '🟡 待补充'}
          </span>
        </div>

        <div class="life-events-edit">
          <div class="events-title">📜 熊生大事</div>
          <div id="eventsListContainer">
            ${eventsHtml}
          </div>
          <div class="add-event-row">
            <input type="date" id="newEventDate" />
            <input type="text" id="newEventText" placeholder="输入大事内容..." />
            <button class="add-event-btn" id="addEventBtn">+ 添加</button>
          </div>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn btn-outline" id="editCancelBtn"><i class="fas fa-times"></i> 取消</button>
        <button class="btn btn-success" id="editSaveBtn"><i class="fas fa-save"></i> 保存</button>
      </div>
    `;

    editBody.innerHTML = html;

    // 机构/所在地
    const orgInput = createSuggestInput('editOrgContainer', orgOptions, 'editOrg', orgVal, '输入或选择机构');
    const locInput = createSuggestInput('editLocContainer', locOptions, 'editLoc', locVal, '输入或选择所在地');

    // 母亲/父亲（使用和机构/所在地相同的样式）
    const motherInput = createSuggestInputWithWildcard('editMotherContainer', allPandaNames, 'editMother', motherDisplay, '输入搜索母亲...');
    const fatherInput = createSuggestInputWithWildcard('editFatherContainer', allPandaNames, 'editFather', fatherDisplay, '输入搜索父亲...');

    // 事件管理
    const addEventBtn = document.getElementById('addEventBtn');
    const newEventDate = document.getElementById('newEventDate');
    const newEventText = document.getElementById('newEventText');
    const eventsListContainer = document.getElementById('eventsListContainer');
    let currentEvents = [...events];

    if (newEventDate) {
      const today = new Date().toISOString().slice(0, 10);
      newEventDate.value = today;
    }

    function renderEventList() {
      if (currentEvents.length === 0) {
        eventsListContainer.innerHTML = '<div class="empty-events-edit">暂无记录</div>';
        return;
      }
      const sorted = [...currentEvents].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      let html2 = '';
      sorted.forEach((e, idx) => {
        const dateDisplay = e.date || '未知日期';
        html2 += `
          <div class="event-row">
            <span class="event-date">${dateDisplay}</span>
            <span class="event-text">${e.event}</span>
            <button class="del-event-btn" data-index="${idx}" title="删除">×</button>
          </div>
        `;
      });
      eventsListContainer.innerHTML = html2;
      eventsListContainer.querySelectorAll('.del-event-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const idx = parseInt(this.dataset.index);
          currentEvents.splice(idx, 1);
          renderEventList();
        });
      });
    }

    addEventBtn.addEventListener('click', function() {
      const date = newEventDate.value.trim();
      const text = newEventText.value.trim();
      if (!text) {
        alert('请填写大事内容');
        return;
      }
      if (!date) {
        alert('请选择日期');
        return;
      }
      currentEvents.push({ date, event: text });
      newEventText.value = '';
      renderEventList();
    });

    newEventText.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addEventBtn.click();
      }
    });

    eventsListContainer.querySelectorAll('.del-event-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = parseInt(this.dataset.index);
        currentEvents.splice(idx, 1);
        renderEventList();
      });
    });

    const toggle = document.getElementById('completeToggle');
    const statusText = document.getElementById('completeStatusText');
    let currentComplete = isComplete;

    toggle.addEventListener('click', function() {
      currentComplete = !currentComplete;
      this.classList.toggle('active', currentComplete);
      if (currentComplete) {
        statusText.textContent = '✅ 已完善';
        statusText.className = 'toggle-status-text complete';
      } else {
        statusText.textContent = '🟡 待补充';
        statusText.className = 'toggle-status-text incomplete';
      }
    });

    const passingRow = document.getElementById('editPassingRow');
    locInput.addEventListener('input', function() {
      if (passingRow) {
        passingRow.style.display = (this.value.trim() === '潘达星') ? 'flex' : 'none';
      }
    });

    document.getElementById('editCancelBtn').addEventListener('click', function() {
      if (isNew) {
        detailHistory = [];
        showPage('pageHome');
      } else {
        openDetail(p.id);
      }
    });

    document.getElementById('editSaveBtn').addEventListener('click', function() {
      p.lifeEvents = currentEvents;
      const motherVal = motherInput.value.trim();
      const fatherVal = fatherInput.value.trim();
      const motherId = motherInput.dataset.selectedId || '';
      const fatherId = fatherInput.dataset.selectedId || '';
      const isMotherWild = motherVal === '野外';
      const isFatherWild = fatherVal === '野外';

      if (motherVal && !isMotherWild && !motherId) {
        alert('母亲 "' + motherVal + '" 未匹配到任何熊猫，请先录入该熊猫或清空此字段');
        return;
      }
      if (fatherVal && !isFatherWild && !fatherId) {
        alert('父亲 "' + fatherVal + '" 未匹配到任何熊猫，请先录入该熊猫或清空此字段');
        return;
      }

      const motherName = isMotherWild ? '野外' : (motherId ? (getPandaById(motherId)?.name || motherVal) : motherVal);
      const fatherName = isFatherWild ? '野外' : (fatherId ? (getPandaById(fatherId)?.name || fatherVal) : fatherVal);

      handleEditSave(p, isNew, orgInput, locInput, motherId, fatherId, motherName, fatherName, currentComplete);
    });
  }

  function handleEditSave(p, isNew, orgInput, locInput, motherId, fatherId, motherName, fatherName, isComplete) {
    const name = document.getElementById('editName').value.trim();
    if (!name) { alert('请填写熊猫名字'); return; }
    const alias = document.getElementById('editAlias').value.trim();

    const existing = pandas.find(item => {
      if (isNew && item.id === 'temp_new') return false;
      if (!isNew && item.id === p.id) return false;
      const itemAlias = (item.alias || '').trim().toLowerCase();
      const inputAlias = (alias || '').trim().toLowerCase();
      return item.name.trim().toLowerCase() === name.toLowerCase() &&
             itemAlias === inputAlias;
    });
    if (existing) {
      const displayName = name + (alias ? '（' + alias + '）' : '');
      alert('"' + displayName + '" 已存在，请使用不同的名字或别名');
      return;
    }

    const gender = document.getElementById('editGender').value;
    const birthday = document.getElementById('editBirthday').value.trim();
    const pedigree = document.getElementById('editPedigree').value.trim();
    const org = orgInput ? orgInput.value.trim() : '';
    const location = locInput ? locInput.value.trim() : '';
    const passingInput = document.getElementById('editPassing');
    const passingDate = passingInput ? passingInput.value : '';

    if (motherId === p.id) {
      alert('不能选择自己作为母亲');
      return;
    }
    if (fatherId === p.id) {
      alert('不能选择自己作为父亲');
      return;
    }

    const lifeEvents = p.lifeEvents || [];

    if (isNew) {
      const newPanda = {
        id: 'p' + (nextId++),
        name,
        alias,
        gender,
        birthday,
        org,
        location,
        mother: motherName,
        father: fatherName,
        motherId: motherId,
        fatherId: fatherId,
        pedigree,
        passingDate: passingDate || '',
        isComplete: isComplete || false,
        lifeEvents: lifeEvents
      };
      pandas.push(newPanda);
      saveData();
      alert('新增 "' + name + (alias ? '（' + alias + '）' : '') + '" 成功');
      detailHistory = [];
      showPage('pageHome');
      renderBrowse();
      doSearch();
    } else {
      p.name = name;
      p.alias = alias;
      p.gender = gender;
      p.birthday = birthday;
      p.pedigree = pedigree;
      p.org = org;
      p.location = location;
      p.mother = motherName;
      p.father = fatherName;
      p.motherId = motherId;
      p.fatherId = fatherId;
      p.isComplete = isComplete || false;
      p.lifeEvents = lifeEvents;
      if (passingDate !== undefined) p.passingDate = passingDate;
      saveData();
      alert('已更新 "' + name + (alias ? '（' + alias + '）' : '') + '" 的信息');
      renderDetail(p);
      showPage('pageDetail');
      renderBrowse();
      doSearch();
    }
  }

  function addNewPanda() {
    const tempPanda = { id: 'temp_new', name: '', alias: '', gender: '雌性', birthday: '', org: '', location: '', mother: '', father: '', motherId: '', fatherId: '', passingDate: '', pedigree: '', isComplete: false, lifeEvents: [] };
    editPandaId = 'temp_new';
    editTitle.textContent = '📝 录入新熊猫';
    renderEditForm(tempPanda, true);
    showPage('pageEdit');
    window.scrollTo(0, 0);
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(pandas, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pandas_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported) || !imported.length || !imported[0].name) {
          alert('数据格式无效，请检查JSON文件');
          return;
        }
        imported.forEach(p => {
          migrateAlias(p);
          if (p.isComplete === undefined) p.isComplete = false;
          if (p.motherId === undefined) p.motherId = '';
          if (p.fatherId === undefined) p.fatherId = '';
          if (p.lifeEvents === undefined) p.lifeEvents = [];
        });

        const overwrite = confirm('将导入 ' + imported.length + ' 条数据，是否覆盖当前所有数据？\n点击"确定"覆盖，"取消"则追加合并。');
        if (overwrite) {
          pandas = imported;
        } else {
          const existing = new Set(pandas.map(p => p.name));
          let added = 0;
          imported.forEach(p => {
            if (!existing.has(p.name)) {
              pandas.push(p);
              existing.add(p.name);
              added++;
            }
          });
          if (added === 0) { alert('所有数据已存在，没有新增'); return; }
        }
        const ids = pandas.map(p => { const n = parseInt(String(p.id).replace('p','')); return isNaN(n)?0:n; });
        nextId = (ids.length ? Math.max(...ids) : 0) + 1;
        saveData();
        alert('导入成功！当前共 ' + pandas.length + ' 条数据');
        searchInput.value = '';
        detailHistory = [];
        renderBrowse();
      } catch(err) {
        alert('解析失败: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // ================================================================
  // 事件绑定
  // ================================================================
  homeTitle.addEventListener('click', function() {
    detailHistory = [];
    showPage('pageHome');
    renderBrowse();
  });

  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keyup', function(e) {
    if (e.key === 'Enter') { doSearch(); return; }
    updateSuggestions(e.target.value);
  });
  searchInput.addEventListener('blur', function() { setTimeout(() => searchSuggestions.classList.remove('show'), 200); });
  searchInput.addEventListener('focus', function() { if (this.value) updateSuggestions(this.value); });

  exportBtn.addEventListener('click', exportData);
  importInput.addEventListener('change', function(e) {
    if (e.target.files.length) { importData(e.target.files[0]); e.target.value = ''; }
  });
  addNewBtn.addEventListener('click', addNewPanda);

  groupByOrgBtn.addEventListener('click', function() { setGroupMode('org'); });
  groupByLocationBtn.addEventListener('click', function() { setGroupMode('location'); });

  filterAllBtn.addEventListener('click', function() { setFilter('all'); });
  filterCompleteBtn.addEventListener('click', function() { setFilter('complete'); });
  filterIncompleteBtn.addEventListener('click', function() { setFilter('incomplete'); });
  filterBirthdayBtn.addEventListener('click', function() { setFilter('birthday'); });

  editBackBtn.addEventListener('click', function() {
    if (editPandaId === 'temp_new') {
      detailHistory = [];
      showPage('pageHome');
    } else if (editPandaId) {
      openDetail(editPandaId);
    } else {
      showPage('pageHome');
    }
  });

  treeBackBtn.addEventListener('click', function() {
    if (currentPandaId) {
      openDetail(currentPandaId);
    } else {
      showPage('pageHome');
    }
  });

  // ================================================================
  // 初始化
  // ================================================================
  setGroupMode('org');
})();
</script>
</body>
</html>
