<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
  <title>🐼 熊猫 · 弹窗档案</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
    body { background: #f3efe8; padding: 16px; min-height: 100vh; display: flex; justify-content: center; }
    #app {
      max-width: 1000px; width: 100%; background: white; border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 20px 20px 28px;
      position: relative;
    }
    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e3dbcf;
      padding-bottom: 6px;
    }
    .nav-tab {
      padding: 10px 22px; border-radius: 40px 40px 0 0; font-weight: 600; color: #4b5f48;
      background: #f0ece5; cursor: pointer; transition: 0.1s; border: 1px solid transparent;
      font-size: 0.95rem; display: flex; align-items: center; gap: 8px;
    }
    .nav-tab i { font-size: 1rem; }
    .nav-tab.active {
      background: #3a5a3a; color: white; border-color: #2d4a2d;
    }
    .nav-tab:hover:not(.active) { background: #e3dbcf; }
    .page { display: none; animation: fade 0.15s; }
    .page.active { display: block; }
    @keyframes fade { from { opacity:0.5; } to { opacity:1; } }

    .browse-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin: 8px 0 16px;
    }
    .browse-toolbar .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      background: #e8e2d8; border: none; padding: 9px 18px; border-radius: 40px;
      font-weight: 500; font-size: 0.9rem; display: inline-flex; align-items: center;
      gap: 8px; cursor: pointer; transition: 0.1s; color: #2a3a28;
    }
    .btn i { font-size: 1rem; }
    .btn-success { background: #2d6b4c; color: white; }
    .btn-success:hover { background: #1f573b; }
    .btn-warning { background: #b78a5c; color: white; }
    .btn-warning:hover { background: #9f744b; }
    .btn-outline { background: transparent; border: 1px solid #b9ae9a; }
    .btn-outline:hover { background: #e3dbcf; }
    .btn-primary { background: #3a5a3a; color: white; }
    .btn-primary:hover { background: #2d4a2d; }
    .btn-danger { background: #b33c3c; color: white; }
    .btn-danger:hover { background: #8f2e2e; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-group .btn.active-mode {
      background: #3a5a3a; color: white; border-color: #2d4a2d;
    }
    .search-box {
      display: flex; background: #f0ede8; border-radius: 60px; padding: 4px 4px 4px 20px;
      border: 1px solid #d6cec0; width: 100%; max-width: 480px;
    }
    .search-box input {
      border: none; background: transparent; padding: 10px 8px; font-size: 0.95rem;
      width: 100%; outline: none;
    }
    .search-box button {
      background: #3a5a3a; border: none; color: white; padding: 8px 22px;
      border-radius: 60px; font-weight: 500; cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .search-box button:hover { background: #2a472a; }

    .org-section {
      margin-bottom: 22px; border-bottom: 1px dashed #d6cec0; padding-bottom: 12px;
    }
    .org-title {
      font-weight: 700; color: #2d462b; font-size: 1.2rem; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .org-title i { color: #5f825c; }
    .panda-list { display: flex; flex-wrap: wrap; gap: 6px 16px; }
    .panda-link {
      cursor: pointer; color: #1f3a1f; background: #f3efe9; padding: 5px 16px;
      border-radius: 40px; font-weight: 500; border: 1px solid #dbd2c4;
      transition: 0.1s; font-size: 0.95rem;
    }
    .panda-link:hover { background: #d9d0c0; border-color: #9b8b77; }
    .panda-link.pandastar {
      background: #f0e6d8; border-color: #c4a88a;
    }
    .panda-link.pandastar:hover { background: #e0d0bc; }

    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px;
      margin: 16px 0 8px;
    }
    .result-card {
      background: #faf8f5; border-radius: 24px; padding: 14px 18px;
      border: 1px solid #e3dbcf; cursor: pointer; transition: 0.1s;
    }
    .result-card:hover { background: #f0ebe2; border-color: #b9ae9a; }
    .result-card .name { font-weight: 700; font-size: 1.2rem; color: #1f3a1f; }
    .result-card .sub { color: #5b7058; font-size: 0.9rem; margin-top: 4px; }
    .result-card .gender-badge {
      display: inline-block; background: #d9d0c0; padding: 0 12px; border-radius: 40px;
      font-size: 0.75rem; margin-left: 8px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 999;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s;
    }
    .modal-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-box {
      background: white;
      border-radius: 40px;
      max-width: 600px;
      width: 94%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 28px 30px 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      position: relative;
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .modal-close {
      position: absolute;
      top: 16px; right: 22px;
      font-size: 1.6rem;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
      transition: 0.1s;
    }
    .modal-close:hover { color: #333; transform: rotate(90deg); }
    .modal-panda-name {
      font-size: 2rem; font-weight: 700; color: #1f3a1f; margin-right: 12px;
    }
    .modal-gender-badge {
      background: #d9d0c0; padding: 4px 18px; border-radius: 40px; font-size: 0.9rem;
    }
    .modal-meta {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
      gap: 10px 18px; background: #f3efe9; padding: 16px 18px; border-radius: 24px;
      margin: 12px 0 16px;
    }
    .modal-meta-item { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
    .modal-meta-item strong { color: #3c543a; font-weight: 600; min-width: 50px; font-size: 0.9rem; }
    .modal-meta-item span { color: #1f2a1d; font-weight: 500; }
    .modal-relations {
      margin: 10px 0 16px;
    }
    .modal-relation-group {
      background: #f8f5f0; border-radius: 20px; padding: 6px 4px 4px 4px;
      margin-bottom: 10px; border: 1px solid #dbd2c4;
    }
    .modal-relation-group .group-title {
      padding: 4px 16px; background: #eae3d8; border-radius: 40px; display: inline-block;
      font-weight: 600; font-size: 0.85rem; color: #364d34; margin-left: 12px; margin-bottom: 4px;
    }
    .modal-relation-list { display: flex; flex-wrap: wrap; gap: 6px 10px; padding: 4px 16px 12px; }
    .modal-relation-chip {
      background: #f2eee8; border-radius: 40px; padding: 5px 16px; font-weight: 500;
      border: 1px solid #cfc4b2; cursor: pointer; transition: 0.1s; font-size: 0.9rem;
    }
    .modal-relation-chip:hover { background: #d9d0c0; border-color: #9b8b77; }
    .modal-actions {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px;
      justify-content: flex-end;
      border-top: 1px solid #e3dbcf; padding-top: 18px;
    }
    .modal-actions .btn { min-width: 80px; justify-content: center; }

    .modal-edit-form .form-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; margin-bottom: 12px;
    }
    .modal-edit-form .form-row label {
      font-weight: 500; color: #2f402d; min-width: 60px;
    }
    .modal-edit-form .form-row input,
    .modal-edit-form .form-row select {
      flex: 1; min-width: 120px; padding: 10px 14px; border-radius: 40px;
      border: 1px solid #cdc0ae; background: white; font-size: 0.95rem;
    }
    .modal-edit-form .form-row input:focus,
    .modal-edit-form .form-row select:focus {
      outline: 2px solid #5f825c; border-color: transparent;
    }
    .modal-edit-form .form-row .input-group {
      flex: 1; min-width: 120px; display: flex; gap: 6px;
    }
    .modal-edit-form .form-row .input-group input {
      flex: 1; min-width: 60px;
    }
    .modal-edit-form .form-row .input-group select {
      flex: 0 0 auto; min-width: 80px; width: auto;
    }
    .modal-edit-actions {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;
      justify-content: flex-end;
    }

    .empty-state { color: #6b7a66; padding: 24px 8px; text-align: center; font-style: italic; }
    .file-input-wrap input[type="file"] { display: none; }

    .storage-status {
      font-size: 0.75rem;
      color: #2d6b4c;
      background: #f0ede8;
      padding: 6px 14px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      height: 100%;
      margin-left: 12px;
      line-height: 1;
    }

    .age-tag {
      display: inline-block;
      background: #d4e0d0;
      color: #1f3a1f;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-left: 8px;
    }

    .import-label {
      cursor: pointer;
    }
    .import-label input[type="file"] {
      display: none;
    }

    @media (max-width: 600px) { #app { padding: 14px; } .modal-box { padding: 20px; } }
  </style>
</head>
<body>
<div id="app">
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="pageBrowse"><i class="fas fa-list"></i> 熊猫档案</div>
    <span class="storage-status" id="storageStatus">💾 0 条数据已保存</span>
  </div>

  <div id="pageBrowse" class="page active">
    <div class="browse-toolbar" style="margin-bottom:10px;">
      <div class="search-box">
        <i class="fas fa-search" style="color:#6d7f6a;"></i>
        <input type="text" id="searchInput" placeholder="输入熊猫名字 (如 花花)" />
        <button id="searchBtn"><i class="fas fa-arrow-right"></i> 搜索</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="addNewBtn"><i class="fas fa-plus-circle"></i> 录入</button>
        <button class="btn btn-success" id="exportBtn"><i class="fas fa-download"></i> 导出</button>
        <label class="btn btn-success import-label">
          <i class="fas fa-upload"></i> 导入
          <input type="file" id="importInput" accept=".json" />
        </label>
      </div>
    </div>

    <div class="browse-toolbar" style="margin:4px 0 16px;">
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <span style="font-size:0.85rem; color:#4b5f48;">列示方式：</span>
        <button class="btn btn-sm btn-outline active-mode" id="groupByOrgBtn"><i class="fas fa-building"></i> 机构</button>
        <button class="btn btn-sm btn-outline" id="groupByLocationBtn"><i class="fas fa-map-pin"></i> 所在地</button>
        <button class="btn btn-sm btn-outline" id="refreshBrowseBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
      </div>
    </div>

    <div id="browseContainer"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalCloseBtn">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'pandaAppData';
  let currentGroupMode = 'org';

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const data = JSON.parse(stored);
        if (Array.isArray(data) && data.length > 0) return data;
      } catch (e) {}
    }
    return [
      { id: 'p1', name: '花花', gender: '雌性', birthday: '2020-07-04', org: '成都大熊猫繁育研究基地', location: '', mother: '成功', father: '美兰' },
      { id: 'p2', name: '和叶', gender: '雌性', birthday: '2020-07-04', org: '成都大熊猫繁育研究基地', location: '', mother: '成功', father: '美兰' },
      { id: 'p3', name: '萌兰', gender: '雄性', birthday: '2015-07-04', org: '北京动物园', location: '北京', mother: '萌萌', father: '美兰' },
      { id: 'p4', name: '美兰', gender: '雄性', birthday: '2006-09-06', org: '成都大熊猫繁育研究基地', location: '', mother: '伦伦', father: '洋洋' },
      { id: 'p5', name: '成功', gender: '雌性', birthday: '2000-08-01', org: '成都大熊猫繁育研究基地', location: '潘达星', mother: '成成', father: '安安' },
    ];
  }

  let pandas = loadData();
  let nextId = 100;
  const ids = pandas.map(p => { const n = parseInt(String(p.id).replace('p','')); return isNaN(n)?0:n; });
  nextId = (ids.length ? Math.max(...ids) : 0) + 1;

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pandas));
      const statusEl = document.getElementById('storageStatus');
      statusEl.textContent = `💾 ${pandas.length} 条数据已保存`;
      statusEl.style.color = '#2d6b4c';
    } catch (e) {
      const statusEl = document.getElementById('storageStatus');
      statusEl.textContent = '⚠️ 保存失败';
      statusEl.style.color = '#b33c3c';
    }
  }

  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const browseContainer = document.getElementById('browseContainer');
  const exportBtn = document.getElementById('exportBtn');
  const importInput = document.getElementById('importInput');
  const refreshBrowseBtn = document.getElementById('refreshBrowseBtn');
  const addNewBtn = document.getElementById('addNewBtn');
  const groupByOrgBtn = document.getElementById('groupByOrgBtn');
  const groupByLocationBtn = document.getElementById('groupByLocationBtn');

  const modalOverlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');
  const modalCloseBtn = document.getElementById('modalCloseBtn');

  function findPandaByName(name) {
    return pandas.find(p => p.name.trim().toLowerCase() === name.trim().toLowerCase());
  }
  function getPandaById(id) { return pandas.find(p => p.id === id); }

  function isWild(value) {
    if (!value) return true;
    const v = value.trim();
    return v === '野外' || v === '野外 ' || v === '野 外';
  }

  // ========== 核心：血缘关系计算 ==========
  function getRelationships(panda) {
    if (!panda) return { parents:[], siblingsSameParents:[], siblingsSameMother:[], siblingsSameFather:[], children:[], spouse:[] };
    const name = panda.name;
    const mother = isWild(panda.mother) ? '' : panda.mother.trim();
    const father = isWild(panda.father) ? '' : panda.father.trim();

    // ---- 父母 ----
    const parents = [];
    if (mother) { const m = findPandaByName(mother); if (m && m.name !== name) parents.push(m); }
    if (father) { const f = findPandaByName(father); if (f && f.name !== name) parents.push(f); }

    // ---- 子女：其他熊猫的母亲或父亲 == 当前熊猫的名字 ----
    const children = pandas.filter(p => {
      if (p.name === name) return false;
      const pMother = isWild(p.mother) ? '' : p.mother.trim();
      const pFather = isWild(p.father) ? '' : p.father.trim();
      return pMother === name || pFather === name;
    });

    // ---- 兄弟姐妹 ----
    const siblingsSameParents = [];
    const siblingsSameMother = [];
    const siblingsSameFather = [];
    pandas.forEach(p => {
      if (p.name === name) return;
      const pMother = isWild(p.mother) ? '' : p.mother.trim();
      const pFather = isWild(p.father) ? '' : p.father.trim();
      const sameMother = mother && pMother && mother === pMother;
      const sameFather = father && pFather && father === pFather;
      if (sameMother && sameFather) {
        siblingsSameParents.push(p);
      } else if (sameMother && !sameFather) {
        siblingsSameMother.push(p);
      } else if (sameFather && !sameMother) {
        siblingsSameFather.push(p);
      }
    });

    // ---- 配偶：有共同子女（且不是父母、不是自己、不是子女） ----
    const spouse = [];
    const myChildrenIds = children.map(c => c.id);
    pandas.forEach(p => {
      if (p.name === name) return;
      // 排除父母
      if (parents.some(par => par.id === p.id)) return;
      // 排除子女
      if (children.some(child => child.id === p.id)) return;
      // 检查对方是否有子女
      const pChildren = pandas.filter(c => {
        const cMother = isWild(c.mother) ? '' : c.mother.trim();
        const cFather = isWild(c.father) ? '' : c.father.trim();
        return cMother === p.name || cFather === p.name;
      });
      // 如果有共同子女（对方的子女ID与我的子女ID有交集）
      const pChildrenIds = pChildren.map(c => c.id);
      const hasCommonChild = pChildrenIds.some(id => myChildrenIds.includes(id));
      if (hasCommonChild) {
        spouse.push(p);
      }
    });

    return { parents, siblingsSameParents, siblingsSameMother, siblingsSameFather, children, spouse };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    try { return new Date(dateStr).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' }); } 
    catch { return dateStr; }
  }

  function calcAge(birthdayStr) {
    if (!birthdayStr) return null;
    let birth;
    try { birth = new Date(birthdayStr); } catch { return null; }
    if (isNaN(birth.getTime())) return null;
    const now = new Date();
    let years = now.getFullYear() - birth.getFullYear();
    let months = now.getMonth() - birth.getMonth();
    if (months < 0) { years--; months += 12; }
    if (years < 0) return null;
    if (years === 0 && months === 0) return '不到1个月';
    let parts = [];
    if (years > 0) parts.push(years + '岁');
    if (months > 0) parts.push(months + '个月');
    return parts.join('');
  }

  function getDistinctValues(field) {
    const values = new Set();
    pandas.forEach(p => {
      const v = p[field] || '';
      if (v.trim()) values.add(v.trim());
    });
    return Array.from(values).sort();
  }

  // ---------- 弹窗 ----------
  let modalMode = 'view';
  let modalPanda = null;

  function openModal(panda, mode = 'view') {
    modalPanda = panda;
    modalMode = mode;
    renderModal();
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
    modalPanda = null;
  }

  function renderModal() {
    if (!modalPanda) {
      modalContent.innerHTML = `<div class="empty-state">数据异常</div>`;
      return;
    }
    if (modalMode === 'edit') {
      renderEditForm();
    } else {
      renderViewMode();
    }
  }

  function renderViewMode() {
    const p = modalPanda;
    const rel = getRelationships(p);

    let ageHtml = '';
    if (p.location && p.location.trim() !== '潘达星') {
      const age = calcAge(p.birthday);
      if (age) {
        ageHtml = `<span class="age-tag">🐣 ${age}</span>`;
      }
    }

    let html = `
      <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px 12px; margin-bottom:4px;">
        <span class="modal-panda-name">🐼 ${p.name}</span>
        <span class="modal-gender-badge">${p.gender||'未知'}</span>
        ${ageHtml}
      </div>
      <div class="modal-meta">
        <div class="modal-meta-item"><strong>生日</strong><span>${formatDate(p.birthday)}</span></div>
        <div class="modal-meta-item"><strong>机构</strong><span>${p.org||'—'}</span></div>
        <div class="modal-meta-item"><strong>所在地</strong><span>${p.location||'—'}</span></div>
        <div class="modal-meta-item"><strong>母亲</strong><span>${p.mother||'—'}</span></div>
        <div class="modal-meta-item"><strong>父亲</strong><span>${p.father||'—'}</span></div>
      </div>
    `;

    const relationGroups = [
      { key: 'parents', label: '👪 父母', list: rel.parents },
      { key: 'children', label: '🐣 子女', list: rel.children },
      { key: 'spouse', label: '💕 配偶', list: rel.spouse },
    ];

    const siblingGroups = [];
    if (rel.siblingsSameParents.length) {
      siblingGroups.push({ label: '👫 同父同母', list: rel.siblingsSameParents });
    }
    if (rel.siblingsSameMother.length) {
      siblingGroups.push({ label: '👩‍👧 同母异父', list: rel.siblingsSameMother });
    }
    if (rel.siblingsSameFather.length) {
      siblingGroups.push({ label: '👨‍👧 同父异母', list: rel.siblingsSameFather });
    }

    let hasRel = false;
    html += `<div class="modal-relations">`;

    relationGroups.forEach(g => {
      if (g.list && g.list.length) {
        hasRel = true;
        html += `<div class="modal-relation-group"><div class="group-title">${g.label}</div><div class="modal-relation-list">`;
        g.list.forEach(p2 => {
          html += `<span class="modal-relation-chip" data-id="${p2.id}"><i class="fas fa-paw"></i> ${p2.name}</span>`;
        });
        html += `</div></div>`;
      }
    });

    siblingGroups.forEach(g => {
      if (g.list && g.list.length) {
        hasRel = true;
        html += `<div class="modal-relation-group"><div class="group-title">${g.label}</div><div class="modal-relation-list">`;
        g.list.forEach(p2 => {
          html += `<span class="modal-relation-chip" data-id="${p2.id}"><i class="fas fa-paw"></i> ${p2.name}</span>`;
        });
        html += `</div></div>`;
      }
    });

    html += `</div>`;
    if (!hasRel) html += `<div class="empty-state" style="margin:4px 0 12px;">暂无血缘关联数据</div>`;

    html += `
      <div class="modal-actions">
        <button class="btn btn-danger" id="modalDeleteBtn"><i class="fas fa-trash-alt"></i> 删除</button>
        <button class="btn btn-primary" id="modalEditBtn"><i class="fas fa-edit"></i> 编辑</button>
        <button class="btn btn-outline" id="modalExitBtn"><i class="fas fa-times"></i> 退出</button>
      </div>
    `;
    modalContent.innerHTML = html;

    document.getElementById('modalDeleteBtn').addEventListener('click', handleDelete);
    document.getElementById('modalEditBtn').addEventListener('click', () => {
      modalMode = 'edit';
      renderModal();
    });
    document.getElementById('modalExitBtn').addEventListener('click', closeModal);

    document.querySelectorAll('.modal-relation-chip[data-id]').forEach(el => {
      el.addEventListener('click', function() {
        const p2 = getPandaById(this.dataset.id);
        if (p2) {
          modalPanda = p2;
          modalMode = 'view';
          renderModal();
        }
      });
    });
  }

  // ---------- 编辑表单 ----------
  function renderEditForm() {
    const p = modalPanda;
    const orgOptions = getDistinctValues('org');
    const locationOptions = getDistinctValues('location');

    const orgOpts = orgOptions.map(v => `<option value="${v}" ${v===p.org?'selected':''}>${v}</option>`).join('');
    const locOpts = locationOptions.map(v => `<option value="${v}" ${v===p.location?'selected':''}>${v}</option>`).join('');

    const html = `
      <div style="font-size:1.3rem; font-weight:600; color:#1f371f; margin-bottom:14px;">
        <i class="fas fa-edit"></i> 编辑 ${p.name}
      </div>
      <div class="modal-edit-form">
        <div class="form-row">
          <label>名字</label>
          <input type="text" id="modalEditName" value="${p.name}" />
        </div>
        <div class="form-row">
          <label>性别</label>
          <select id="modalEditGender">
            <option value="雌性" ${p.gender==='雌性'?'selected':''}>雌性</option>
            <option value="雄性" ${p.gender==='雄性'?'selected':''}>雄性</option>
            <option value="未知" ${p.gender==='未知'?'selected':''}>未知</option>
          </select>
        </div>
        <div class="form-row">
          <label>生日</label>
          <input type="date" id="modalEditBirthday" value="${p.birthday||''}" />
        </div>
        <div class="form-row">
          <label>机构</label>
          <div class="input-group">
            <input type="text" id="modalEditOrg" value="${p.org||''}" placeholder="输入或选择" list="orgList" />
            <datalist id="orgList">${orgOpts}</datalist>
            <select id="modalEditOrgSelect" style="flex:0 0 auto; min-width:80px; width:auto; padding:10px 10px;">
              <option value="">— 选择 —</option>
              ${orgOpts}
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>所在地</label>
          <div class="input-group">
            <input type="text" id="modalEditLocation" value="${p.location||''}" placeholder="输入或选择" list="locList" />
            <datalist id="locList">${locOpts}</datalist>
            <select id="modalEditLocationSelect" style="flex:0 0 auto; min-width:80px; width:auto; padding:10px 10px;">
              <option value="">— 选择 —</option>
              ${locOpts}
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>母亲</label>
          <input type="text" id="modalEditMother" value="${p.mother||''}" placeholder="母亲名字" />
        </div>
        <div class="form-row">
          <label>父亲</label>
          <input type="text" id="modalEditFather" value="${p.father||''}" placeholder="父亲名字" />
        </div>
      </div>
      <div class="modal-edit-actions">
        <button class="btn btn-success" id="modalSaveEditBtn"><i class="fas fa-save"></i> 保存</button>
        <button class="btn btn-outline" id="modalCancelEditBtn"><i class="fas fa-undo-alt"></i> 取消</button>
      </div>
    `;
    modalContent.innerHTML = html;

    const orgInput = document.getElementById('modalEditOrg');
    const orgSelect = document.getElementById('modalEditOrgSelect');
    const locInput = document.getElementById('modalEditLocation');
    const locSelect = document.getElementById('modalEditLocationSelect');

    orgSelect.addEventListener('change', function() {
      if (this.value) orgInput.value = this.value;
    });
    orgInput.addEventListener('input', function() {
      const opts = orgSelect.querySelectorAll('option');
      let matched = false;
      opts.forEach(opt => {
        if (opt.value && opt.value === this.value) {
          orgSelect.value = opt.value;
          matched = true;
        }
      });
      if (!matched && this.value) orgSelect.value = '';
    });

    locSelect.addEventListener('change', function() {
      if (this.value) locInput.value = this.value;
    });
    locInput.addEventListener('input', function() {
      const opts = locSelect.querySelectorAll('option');
      let matched = false;
      opts.forEach(opt => {
        if (opt.value && opt.value === this.value) {
          locSelect.value = opt.value;
          matched = true;
        }
      });
      if (!matched && this.value) locSelect.value = '';
    });

    document.getElementById('modalSaveEditBtn').addEventListener('click', handleSaveEdit);
    document.getElementById('modalCancelEditBtn').addEventListener('click', () => {
      modalMode = 'view';
      renderModal();
    });
  }

  // ---------- 删除 ----------
  function handleDelete() {
    if (!modalPanda) return;
    if (confirm(`确定要删除熊猫 "${modalPanda.name}" 吗？此操作不可撤销！`)) {
      const idx = pandas.findIndex(p => p.id === modalPanda.id);
      if (idx !== -1) {
        pandas.splice(idx, 1);
        saveData();
        alert(`已删除 "${modalPanda.name}"`);
        closeModal();
        renderBrowse();
        doSearch();
      } else {
        alert('数据异常，删除失败');
      }
    }
  }

  // ---------- 保存编辑 ----------
  function handleSaveEdit() {
    const name = document.getElementById('modalEditName').value.trim();
    if (!name) { alert('名字不能为空'); return; }
    const gender = document.getElementById('modalEditGender').value;
    const birthday = document.getElementById('modalEditBirthday').value || '';
    const org = document.getElementById('modalEditOrg').value.trim();
    const location = document.getElementById('modalEditLocation').value.trim();
    const mother = document.getElementById('modalEditMother').value.trim();
    const father = document.getElementById('modalEditFather').value.trim();

    const existing = findPandaByName(name);
    if (existing && existing.id !== modalPanda.id) {
      alert(`"${name}" 已存在，请使用不同的名字`);
      return;
    }

    modalPanda.name = name;
    modalPanda.gender = gender;
    modalPanda.birthday = birthday;
    modalPanda.org = org;
    modalPanda.location = location;
    modalPanda.mother = mother;
    modalPanda.father = father;

    saveData();
    alert(`已更新 "${name}" 的信息`);
    modalMode = 'view';
    renderModal();
    renderBrowse();
    doSearch();
  }

  // ---------- 搜索 ----------
  function doSearch() {
    const keyword = searchInput.value.trim();
    const container = browseContainer;
    if (!keyword) {
      renderBrowse();
      return;
    }
    const results = pandas.filter(p => p.name.includes(keyword));
    if (results.length === 0) {
      container.innerHTML = `<div class="empty-state" style="padding:30px 8px;">未找到 “${keyword}”</div>`;
      return;
    }
    let html = `<div class="result-grid">`;
    results.forEach(p => {
      html += `<div class="result-card" data-id="${p.id}">
        <div class="name">${p.name} <span class="gender-badge">${p.gender||'未知'}</span></div>
        <div class="sub">${p.org||'—'} · ${p.location||'—'}</div>
      </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
    document.querySelectorAll('.result-card[data-id]').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) { openModal(p, 'view'); }
      });
    });
  }

  // ---------- 浏览 ----------
  function renderBrowse() {
    const pandastarList = [];
    const normalMap = new Map();

    pandas.forEach(p => {
      if (p.location && p.location.trim() === '潘达星') {
        pandastarList.push(p);
      } else {
        const key = currentGroupMode === 'org' ? (p.org || '未归类') : (p.location || '未知所在地');
        if (!normalMap.has(key)) normalMap.set(key, []);
        normalMap.get(key).push(p);
      }
    });

    let html = '';
    const sortedKeys = Array.from(normalMap.keys()).sort();
    for (let key of sortedKeys) {
      const list = normalMap.get(key);
      const icon = currentGroupMode === 'org' ? 'fa-building' : 'fa-map-pin';
      html += `<div class="org-section"><div class="org-title"><i class="fas ${icon}"></i> ${key}</div><div class="panda-list">`;
      list.sort((a,b)=> a.name.localeCompare(b.name));
      list.forEach(p => {
        html += `<span class="panda-link" data-id="${p.id}">${p.name}</span>`;
      });
      html += `</div></div>`;
    }

    if (pandastarList.length) {
      html += `<div class="org-section"><div class="org-title"><i class="fas fa-star" style="color:#d4a373;"></i> 潘达星 ✨</div><div class="panda-list">`;
      pandastarList.sort((a,b)=> a.name.localeCompare(b.name));
      pandastarList.forEach(p => {
        html += `<span class="panda-link pandastar" data-id="${p.id}">${p.name}</span>`;
      });
      html += `</div></div>`;
    }

    if (!html) html = `<div class="empty-state">暂无熊猫数据</div>`;
    browseContainer.innerHTML = html;
    document.querySelectorAll('.panda-link[data-id]').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) { openModal(p, 'view'); }
      });
    });
    saveData();
  }

  function setGroupMode(mode) {
    currentGroupMode = mode;
    groupByOrgBtn.classList.toggle('active-mode', mode === 'org');
    groupByLocationBtn.classList.toggle('active-mode', mode === 'location');
    if (searchInput.value.trim()) {
      searchInput.value = '';
    }
    renderBrowse();
  }

  // ---------- 导入导出 ----------
  function exportData() {
    const blob = new Blob([JSON.stringify(pandas, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `pandas_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (Array.isArray(imported) && imported.length && imported[0].name) {
          if (confirm(`将导入 ${imported.length} 条数据，是否覆盖当前所有数据？\n点击"确定"覆盖，"取消"则追加合并。`)) {
            pandas = imported;
          } else {
            const existingNames = new Set(pandas.map(p => p.name));
            let added = 0;
            imported.forEach(p => {
              if (!existingNames.has(p.name)) {
                pandas.push(p);
                existingNames.add(p.name);
                added++;
              }
            });
            if (added === 0) { alert('所有数据已存在，没有新增'); return; }
          }
          const ids = pandas.map(p => { const n = parseInt(String(p.id).replace('p','')); return isNaN(n)?0:n; });
          nextId = (ids.length ? Math.max(...ids) : 0) + 1;
          saveData();
          alert(`导入成功！当前共 ${pandas.length} 条数据`);
          searchInput.value = '';
          renderBrowse();
        } else {
          alert('数据格式无效，请检查JSON文件');
        }
      } catch(err) {
        alert('解析失败: '+err.message);
      }
    };
    reader.readAsText(file);
  }

  // ---------- 新增熊猫 ----------
  function addNewPanda() {
    const newPanda = { id: 'temp_new', name: '', gender: '雌性', birthday: '', org: '', location: '', mother: '', father: '' };
    modalPanda = newPanda;
    modalMode = 'edit';
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    renderNewForm();
  }

  function renderNewForm() {
    const orgOptions = getDistinctValues('org');
    const locationOptions = getDistinctValues('location');
    const orgOpts = orgOptions.map(v => `<option value="${v}">${v}</option>`).join('');
    const locOpts = locationOptions.map(v => `<option value="${v}">${v}</option>`).join('');

    const html = `
      <div style="font-size:1.3rem; font-weight:600; color:#1f371f; margin-bottom:14px;">
        <i class="fas fa-plus-circle"></i> 录入新熊猫
      </div>
      <div class="modal-edit-form">
        <div class="form-row">
          <label>名字</label>
          <input type="text" id="modalEditName" placeholder="如：花花" />
        </div>
        <div class="form-row">
          <label>性别</label>
          <select id="modalEditGender">
            <option value="雌性">雌性</option>
            <option value="雄性">雄性</option>
            <option value="未知">未知</option>
          </select>
        </div>
        <div class="form-row">
          <label>生日</label>
          <input type="date" id="modalEditBirthday" />
        </div>
        <div class="form-row">
          <label>机构</label>
          <div class="input-group">
            <input type="text" id="modalEditOrg" placeholder="输入或选择" list="orgList" />
            <datalist id="orgList">${orgOpts}</datalist>
            <select id="modalEditOrgSelect" style="flex:0 0 auto; min-width:80px; width:auto; padding:10px 10px;">
              <option value="">— 选择 —</option>
              ${orgOpts}
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>所在地</label>
          <div class="input-group">
            <input type="text" id="modalEditLocation" placeholder="输入或选择" list="locList" />
            <datalist id="locList">${locOpts}</datalist>
            <select id="modalEditLocationSelect" style="flex:0 0 auto; min-width:80px; width:auto; padding:10px 10px;">
              <option value="">— 选择 —</option>
              ${locOpts}
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>母亲</label>
          <input type="text" id="modalEditMother" placeholder="母亲名字" />
        </div>
        <div class="form-row">
          <label>父亲</label>
          <input type="text" id="modalEditFather" placeholder="父亲名字" />
        </div>
      </div>
      <div class="modal-edit-actions">
        <button class="btn btn-success" id="modalSaveNewBtn"><i class="fas fa-save"></i> 保存</button>
        <button class="btn btn-outline" id="modalCancelNewBtn"><i class="fas fa-times"></i> 取消</button>
      </div>
    `;
    modalContent.innerHTML = html;

    const orgInput = document.getElementById('modalEditOrg');
    const orgSelect = document.getElementById('modalEditOrgSelect');
    const locInput = document.getElementById('modalEditLocation');
    const locSelect = document.getElementById('modalEditLocationSelect');

    orgSelect.addEventListener('change', function() { if (this.value) orgInput.value = this.value; });
    orgInput.addEventListener('input', function() {
      const opts = orgSelect.querySelectorAll('option');
      let matched = false;
      opts.forEach(opt => { if (opt.value && opt.value === this.value) { orgSelect.value = opt.value; matched = true; } });
      if (!matched && this.value) orgSelect.value = '';
    });
    locSelect.addEventListener('change', function() { if (this.value) locInput.value = this.value; });
    locInput.addEventListener('input', function() {
      const opts = locSelect.querySelectorAll('option');
      let matched = false;
      opts.forEach(opt => { if (opt.value && opt.value === this.value) { locSelect.value = opt.value; matched = true; } });
      if (!matched && this.value) locSelect.value = '';
    });

    document.getElementById('modalSaveNewBtn').addEventListener('click', handleSaveNew);
    document.getElementById('modalCancelNewBtn').addEventListener('click', closeModal);
  }

  function handleSaveNew() {
    const name = document.getElementById('modalEditName').value.trim();
    if (!name) { alert('请填写熊猫名字'); return; }
    if (findPandaByName(name)) { alert(`"${name}" 已存在，请使用不同的名字`); return; }
    const gender = document.getElementById('modalEditGender').value;
    const birthday = document.getElementById('modalEditBirthday').value || '';
    const org = document.getElementById('modalEditOrg').value.trim();
    const location = document.getElementById('modalEditLocation').value.trim();
    const mother = document.getElementById('modalEditMother').value.trim();
    const father = document.getElementById('modalEditFather').value.trim();

    const newPanda = { id: 'p'+(nextId++), name, gender, birthday, org, location, mother, father };
    pandas.push(newPanda);
    saveData();
    alert(`新增 "${name}" 成功`);
    closeModal();
    searchInput.value = '';
    renderBrowse();
  }

  // ---------- 事件绑定 ----------
  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keyup', e => { if (e.key==='Enter') doSearch(); });
  exportBtn.addEventListener('click', exportData);
  importInput.addEventListener('change', e => {
    if (e.target.files.length) { importData(e.target.files[0]); e.target.value=''; }
  });
  refreshBrowseBtn.addEventListener('click', () => {
    searchInput.value = '';
    renderBrowse();
  });
  addNewBtn.addEventListener('click', addNewPanda);

  groupByOrgBtn.addEventListener('click', () => setGroupMode('org'));
  groupByLocationBtn.addEventListener('click', () => setGroupMode('location'));

  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) closeModal();
  });
  modalCloseBtn.addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
  });

  setGroupMode('org');
})();
</script>
</body>
</html>
