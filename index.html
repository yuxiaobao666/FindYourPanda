<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover" />
  <title>🐼熊猫档案🐼</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐼</text></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
    body { background: #f3efe8; padding: 16px; min-height: 100vh; display: flex; justify-content: center; }
    #app {
      max-width: 1000px; width: 100%; background: white; border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 20px 20px 28px;
      position: relative;
      min-height: 80vh;
    }
    .page-container { position: relative; overflow: hidden; }
    .page-view { display: none; animation: fadeSlideIn 0.25s ease-out; }
    .page-view.active { display: block; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .nav-tabs {
      display: flex; align-items: center; gap: 6px; margin-bottom: 20px;
      border-bottom: 2px solid #e3dbcf; padding-bottom: 6px;
      flex-wrap: wrap;
    }
    .nav-tab {
      padding: 10px 22px; border-radius: 40px 40px 0 0; font-weight: 600; color: #4b5f48;
      background: #f0ece5; cursor: pointer; transition: 0.1s; border: 1px solid transparent;
      font-size: 0.95rem; display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    .nav-tab i { font-size: 1rem; }
    .nav-tab.active { background: #3a5a3a; color: white; border-color: #2d4a2d; }
    .nav-tab:hover:not(.active) { background: #e3dbcf; }
    .nav-tab.home-tab { cursor: pointer; }

    .storage-status {
      font-size: 0.75rem; color: #2d6b4c; background: #f0ede8;
      padding: 6px 14px; border-radius: 40px; display: inline-flex; align-items: center;
      height: 100%; margin-left: 12px; line-height: 1;
    }

    .browse-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin: 8px 0 16px;
    }
    .browse-toolbar .btn-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn {
      background: #e8e2d8; border: none; padding: 9px 18px; border-radius: 40px;
      font-weight: 500; font-size: 0.9rem; display: inline-flex; align-items: center;
      gap: 8px; cursor: pointer; transition: 0.1s; color: #2a3a28;
    }
    .btn i { font-size: 1rem; }
    .btn-success { background: #2d6b4c; color: white; }
    .btn-success:hover { background: #1f573b; }
    .btn-warning { background: #b78a5c; color: white; }
    .btn-warning:hover { background: #9f744b; }
    .btn-outline { background: transparent; border: 1px solid #b9ae9a; }
    .btn-outline:hover { background: #e3dbcf; }
    .btn-primary { background: #3a5a3a; color: white; }
    .btn-primary:hover { background: #2d4a2d; }
    .btn-danger { background: #b33c3c; color: white; }
    .btn-danger:hover { background: #8f2e2e; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-group .btn.active-mode { background: #3a5a3a; color: white; border-color: #2d4a2d; }
    .btn-group .btn.filter-active { background: #5a7a5a; color: white; border-color: #4a6a4a; }
    .btn-group .btn.filter-active:hover { background: #4a6a4a; }

    .search-box {
      display: flex; background: #f0ede8; border-radius: 60px; padding: 4px 4px 4px 20px;
      border: 1px solid #d6cec0; width: 100%; max-width: 480px; position: relative;
      align-items: center;
    }
    .search-box i { align-self: center; margin-top: 2px; }
    .search-box input {
      border: none; background: transparent; padding: 10px 8px; font-size: 0.95rem;
      width: 100%; outline: none;
    }
    .search-box button {
      background: #3a5a3a; border: none; color: white; padding: 8px 22px;
      border-radius: 60px; font-weight: 500; cursor: pointer;
      white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .search-box button:hover { background: #2a472a; }
    .search-suggestions {
      position: absolute; top: 100%; left: 0; right: 0; background: white;
      border: 1px solid #d6cec0; border-radius: 20px; margin-top: 4px;
      max-height: 200px; overflow-y: auto; z-index: 100;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12); display: none;
    }
    .search-suggestions.show { display: block; }
    .search-suggestions .suggestion-item {
      padding: 8px 20px; cursor: pointer; border-bottom: 1px solid #f0ede8;
      display: flex; align-items: center; gap: 10px;
    }
    .search-suggestions .suggestion-item:hover { background: #f0ede8; }
    .search-suggestions .suggestion-item .s-name { font-weight: 500; }
    .search-suggestions .suggestion-item .s-sub { font-size: 0.8rem; color: #7a8a77; }

    .stats-row {
      display: flex; flex-wrap: wrap; gap: 12px 20px; background: #f8f5f0;
      border-radius: 24px; padding: 12px 20px; margin-bottom: 16px;
      border: 1px solid #e3dbcf;
    }
    .stats-row .stat-item {
      display: flex; align-items: baseline; gap: 4px; font-size: 0.9rem; color: #3a4a38;
    }
    .stats-row .stat-item .num { font-weight: 700; font-size: 1.1rem; color: #1f3a1f; }
    .stats-row .stat-item .label { color: #6a7a66; }

    .filter-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      padding: 8px 0 12px 0;
      border-bottom: 1px solid #f0ede8;
      margin-bottom: 16px;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-group .label {
      font-size: 0.85rem;
      color: #5a6a56;
      font-weight: 500;
    }
    .filter-group .btn {
      font-size: 0.8rem;
      padding: 4px 14px;
      border-radius: 40px;
      background: #f0ede8;
      border: 1px solid #e0d8cc;
      color: #5a6a56;
      cursor: pointer;
      transition: 0.1s;
    }
    .filter-group .btn:hover {
      background: #e3dbcf;
    }
    .filter-group .btn.active {
      background: #3a5a3a;
      color: white;
      border-color: #2d4a2d;
    }
    .filter-group .btn i { margin-right: 4px; }

    .org-section {
      margin-bottom: 22px; border-bottom: 1px dashed #d6cec0; padding-bottom: 12px;
    }
    .org-title {
      font-weight: 700; color: #2d462b; font-size: 1.2rem; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .org-title i { color: #5f825c; }
    .org-title .count-badge {
      font-size: 0.8rem; font-weight: 400; color: #6a7a66;
      background: #f0ede8; padding: 0 12px; border-radius: 40px;
    }
    .org-title .passing-date {
      font-size: 0.85rem; font-weight: 400; color: #8a7a6a;
      background: #f3efe9; padding: 2px 14px; border-radius: 40px;
    }
    .panda-list { display: flex; flex-wrap: wrap; gap: 6px 12px; }

    .panda-link {
      cursor: pointer; color: #1f3a1f; background: #f3efe9; padding: 5px 16px;
      border-radius: 40px; font-weight: 500; border: 1px solid #dbd2c4;
      transition: 0.1s; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 4px;
    }
    .panda-link:hover { background: #d9d0c0; border-color: #9b8b77; }
    .panda-link .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 2px;
      flex-shrink: 0;
    }
    .panda-link .status-dot.complete { background: #2d8a4e; }
    .panda-link .status-dot.incomplete { background: #d4a030; }
    .panda-link .gender-tag {
      font-size: 0.65rem; font-weight: 600; padding: 0 6px; border-radius: 20px;
      background: #d9d0c0; color: #4a5a48;
    }
    .panda-link .gender-tag.female { background: #f5d6d6; color: #a05050; }
    .panda-link .gender-tag.male { background: #d0ddf5; color: #406090; }
    .panda-link.pandastar { background: #f0e6d8; border-color: #c4a88a; }
    .panda-link.pandastar:hover { background: #e0d0bc; }

    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px;
      margin: 16px 0 8px;
    }
    .result-card {
      background: #faf8f5; border-radius: 24px; padding: 14px 18px;
      border: 1px solid #e3dbcf; cursor: pointer; transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-card:hover { background: #f0ebe2; border-color: #b9ae9a; }
    .result-card .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .result-card .status-dot.complete { background: #2d8a4e; }
    .result-card .status-dot.incomplete { background: #d4a030; }
    .result-card .name {
      font-weight: 700; font-size: 1.2rem; color: #1f3a1f;
    }
    .result-card .alias-text {
      font-size: 0.85rem;
      color: #8a9a86;
      font-weight: 400;
      margin-left: 4px;
    }
    .result-card .sub { color: #5b7058; font-size: 0.9rem; margin-top: 4px; }
    .result-card .gender-badge {
      display: inline-block; background: #d9d0c0; padding: 0 12px; border-radius: 40px;
      font-size: 0.75rem; margin-left: 8px;
    }
    .result-card .gender-badge.female { background: #f5d6d6; color: #a05050; }
    .result-card .gender-badge.male { background: #d0ddf5; color: #406090; }

    .empty-state { color: #6b7a66; padding: 24px 8px; text-align: center; font-style: italic; }
    .import-label { cursor: pointer; }
    .import-label input[type="file"] { display: none; }

    .page-view .page-header {
      display: flex; align-items: center; padding: 4px 0 16px 0;
      border-bottom: 1px solid #f0ede8; margin-bottom: 16px; gap: 12px;
    }
    .page-view .page-header .back-btn {
      background: none; border: none; font-size: 1.1rem; color: #5a6a56;
      cursor: pointer; padding: 4px 8px 4px 0; display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .page-view .page-header .back-btn:hover { color: #2d462b; }
    .page-view .page-header .page-title {
      font-size: 1.5rem; font-weight: 700; color: #1f3a1f;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .detail-header {
      display: flex;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 8px;
    }
    .detail-header .panda-name {
      font-size: 2rem;
      font-weight: 700;
      color: #1f3a1f;
      line-height: 1.2;
    }
    .detail-header .panda-alias {
      font-size: 1rem;
      color: #8a9a86;
      font-weight: 400;
    }
    .detail-header .panda-age {
      font-size: 0.95rem;
      color: #5a6a56;
      padding-bottom: 2px;
    }

    .detail-info-list {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .life-events-section {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .detail-relations {
      margin-bottom: 16px;
    }
    .detail-relation-group {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 6px 4px 4px 4px;
      margin-bottom: 8px;
      border: 1px solid #e3dbcf;
    }
    .detail-relation-group:last-child {
      margin-bottom: 0;
    }

    .detail-relations .empty-state {
      margin-bottom: 0;
    }

    .detail-info-item {
      display: flex;
      padding: 4px 0;
      border-bottom: 1px solid #eeebe5;
      font-size: 0.95rem;
    }
    .detail-info-item:last-child { border-bottom: none; }
    .detail-info-item .label {
      color: #5a6a56;
      min-width: 72px;
      font-weight: 500;
      flex-shrink: 0;
      text-align: left;
    }
    .detail-info-item .value {
      color: #1f2a1d;
      font-weight: 500;
      word-break: break-word;
      flex: 1;
    }
    .detail-info-item .value .age-tag {
      display: inline-block;
      background: #d4e0d0;
      color: #1f3a1f;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-left: 8px;
    }
    .detail-info-item .value .gender-badge {
      background: #d9d0c0;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .detail-info-item .value .status-badge {
      display: inline-block;
      padding: 0 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .detail-info-item .value .status-badge.complete {
      background: #d4e8d4;
      color: #1a5a2a;
    }
    .detail-info-item .value .status-badge.incomplete {
      background: #f5edd4;
      color: #8a7020;
    }

    .life-events-section .section-title {
      font-weight: 600;
      font-size: 1rem;
      color: #2d462b;
      margin-bottom: 8px;
    }
    .life-events-section .event-item {
      display: flex;
      align-items: baseline;
      padding: 3px 0;
      border-bottom: 1px solid #eeebe5;
      font-size: 0.9rem;
    }
    .life-events-section .event-item:last-child {
      border-bottom: none;
    }
    .life-events-section .event-item .event-date {
      color: #6a7a66;
      min-width: 100px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .life-events-section .event-item .event-text {
      color: #1f2a1d;
    }

    .detail-relation-group .group-title {
      padding: 2px 14px;
      background: #eae3d8;
      border-radius: 40px;
      display: inline-block;
      font-weight: 600;
      font-size: 0.8rem;
      color: #364d34;
      margin-left: 10px;
      margin-bottom: 2px;
    }
    .detail-relation-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      padding: 4px 12px 10px 12px;
    }
    .detail-relation-chip {
      background: #f2eee8;
      border-radius: 40px;
      padding: 4px 14px;
      font-weight: 500;
      border: 1px solid #cfc4b2;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
    }
    .detail-relation-chip:hover { background: #d9d0c0; border-color: #9b8b77; }
    .detail-relation-chip .chip-alias {
      font-weight: 400;
      color: #8a9a86;
      font-size: 0.75rem;
    }
    .detail-relation-chip.wild {
      background: #e8e8e0;
      color: #8a8a7a;
      border-color: #d0d0c8;
      cursor: default;
    }
    .detail-relation-chip.wild:hover {
      background: #e8e8e0;
      border-color: #d0d0c8;
    }
    .detail-relation-chip.unlinked {
      background: #f5f0ea;
      color: #9a8a7a;
      border-color: #d8d0c8;
      cursor: default;
      font-style: italic;
    }
    .detail-relation-chip.unlinked:hover {
      background: #f5f0ea;
      border-color: #d8d0c8;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0ede8;
      align-items: center;
    }
    .detail-actions .btn { min-width: 70px; justify-content: center; }
    .detail-actions .btn-left {
      margin-right: auto;
    }

    /* ===== 编辑页样式 ===== */
    .edit-form .form-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px; margin-bottom: 10px;
    }
    .edit-form .form-row label {
      font-weight: 500; color: #2f402d; min-width: 56px; font-size: 0.9rem;
    }
    .edit-form .form-row label .required { color: #b33c3c; }
    .edit-form .form-row input,
    .edit-form .form-row select {
      flex: 1; min-width: 100px; padding: 8px 14px; border-radius: 40px;
      border: 1px solid #cdc0ae; background: white; font-size: 0.9rem; outline: none;
    }
    .edit-form .form-row input:focus,
    .edit-form .form-row select:focus {
      outline: 2px solid #5f825c; border-color: transparent;
    }

    .life-events-edit {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0ede8;
    }
    .life-events-edit .events-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: #2d462b;
      margin-bottom: 8px;
    }
    .life-events-edit .event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #f5f0ea;
      font-size: 0.9rem;
    }
    .life-events-edit .event-row .event-date {
      color: #6a7a66;
      min-width: 100px;
      flex-shrink: 0;
    }
    .life-events-edit .event-row .event-text {
      flex: 1;
      color: #1f2a1d;
    }
    .life-events-edit .event-row .del-event-btn {
      background: none;
      border: none;
      color: #c0a8a0;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      transition: 0.1s;
    }
    .life-events-edit .event-row .del-event-btn:hover {
      color: #b33c3c;
    }
    .life-events-edit .add-event-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .life-events-edit .add-event-row input[type="date"] {
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px solid #cdc0ae;
      background: white;
      font-size: 0.85rem;
      outline: none;
      min-width: 120px;
    }
    .life-events-edit .add-event-row input[type="date"]:focus {
      outline: 2px solid #5f825c;
      border-color: transparent;
    }
    .life-events-edit .add-event-row input[type="text"] {
      flex: 1;
      min-width: 120px;
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid #cdc0ae;
      background: white;
      font-size: 0.85rem;
      outline: none;
    }
    .life-events-edit .add-event-row input[type="text"]:focus {
      outline: 2px solid #5f825c;
      border-color: transparent;
    }
    .life-events-edit .add-event-row .add-event-btn {
      padding: 6px 16px;
      border-radius: 40px;
      border: none;
      background: #3a5a3a;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .life-events-edit .add-event-row .add-event-btn:hover {
      background: #2d4a2d;
    }
    .life-events-edit .empty-events-edit {
      color: #8a9a86;
      font-style: italic;
      font-size: 0.85rem;
      padding: 4px 0;
    }

    .complete-toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 4px 0;
      margin-bottom: 4px;
    }
    .complete-toggle-row .toggle-label {
      font-weight: 500;
      color: #2f402d;
      font-size: 0.9rem;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #d0c8bc;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch.active {
      background: #2d8a4e;
    }
    .toggle-switch .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .toggle-switch.active .toggle-knob {
      left: 22px;
    }
    .toggle-status-text {
      font-size: 0.85rem;
      color: #5a6a56;
    }
    .toggle-status-text.complete { color: #2d8a4e; font-weight: 500; }
    .toggle-status-text.incomplete { color: #d4a030; font-weight: 500; }

    .custom-suggest {
      position: relative;
      flex: 1;
      min-width: 100px;
    }
    .custom-suggest input {
      width: 100%;
      padding: 8px 14px;
      border-radius: 40px;
      border: 1px solid #cdc0ae;
      background: white;
      font-size: 0.9rem;
      outline: none;
    }
    .custom-suggest input:focus {
      outline: 2px solid #5f825c;
      border-color: transparent;
    }
    .custom-suggest .suggest-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #cdc0ae;
      border-radius: 16px;
      margin-top: 4px;
      max-height: 150px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      display: none;
    }
    .custom-suggest .suggest-dropdown.show { display: block; }

<script>
(function(){
  // ================================================================
  // 数据层
  // ================================================================
  const STORAGE_KEY = 'pandaAppData';
  const LOC_EVENTS_KEY = 'pandaAppLocEvents';
  let currentGroupMode = 'org';
  let currentFilter = 'all';
  let currentPandaId = null;
  let editPandaId = null;
  let detailHistory = [];

  // ================================================================
  // 别名自动迁移
  // ================================================================
  function migrateAlias(panda) {
    if (!panda) return;
    if (panda.alias !== undefined && panda.alias !== null) return;
    const match = panda.name.match(/^(.+)（(.+)）$/);
    if (match) {
      panda.name = match[1].trim();
      panda.alias = match[2].trim();
    } else {
      panda.alias = '';
    }
  }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const data = JSON.parse(stored);
        if (Array.isArray(data) && data.length > 0) {
          data.forEach(p => {
            migrateAlias(p);
            if (p.isComplete === undefined) p.isComplete = false;
            if (p.motherId === undefined) p.motherId = '';
            if (p.fatherId === undefined) p.fatherId = '';
            if (p.lifeEvents === undefined) p.lifeEvents = [];
          });
          return data;
        }
      } catch (e) {}
    }
    return [
      { id: 'p1', name: '花花', gender: '雌性', birthday: '2020-07-04', org: '成都大熊猫繁育研究基地', location: '成都', mother: '成功', father: '美兰', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p2', name: '和叶', gender: '雌性', birthday: '2020-07-04', org: '成都大熊猫繁育研究基地', location: '成都', mother: '成功', father: '美兰', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p3', name: '萌兰', gender: '雄性', birthday: '2015-07-04', org: '北京动物园', location: '北京', mother: '萌萌', father: '美兰', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p4', name: '美兰', gender: '雄性', birthday: '2006-09-06', org: '成都大熊猫繁育研究基地', location: '成都', mother: '伦伦', father: '洋洋', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
      { id: 'p5', name: '成功', gender: '雌性', birthday: '2000-08-01', org: '成都大熊猫繁育研究基地', location: '潘达星', mother: '成成', father: '安安', motherId: '', fatherId: '', pedigree: '', alias: '', isComplete: false, lifeEvents: [] },
    ];
  }

  let pandas = loadData();
  let nextId = 100;
  const ids = pandas.map(p => { const n = parseInt(String(p.id).replace('p','')); return isNaN(n)?0:n; });
  nextId = (ids.length ? Math.max(...ids) : 0) + 1;

  // ================================================================
  // 所在地大事数据
  // ================================================================
  function loadLocEvents() {
    const stored = localStorage.getItem(LOC_EVENTS_KEY);
    if (stored) {
      try {
        const data = JSON.parse(stored);
        if (Array.isArray(data)) return data;
      } catch (e) {}
    }
    return [];
  }

  let locEvents = loadLocEvents();
  let locEventNextId = 100;

  function saveLocEvents() {
    try {
      localStorage.setItem(LOC_EVENTS_KEY, JSON.stringify(locEvents));
    } catch (e) {}
  }

  // ================================================================
  // 工具函数
  // ================================================================
  function getDisplayName(panda) {
    if (!panda) return '';
    if (panda.alias) return panda.name + '（' + panda.alias + '）';
    return panda.name;
  }

  function findPandaByName(name) {
    if (!name || name.trim() === '') return null;
    return pandas.find(p => p.name.trim().toLowerCase() === name.trim().toLowerCase());
  }
  function getPandaById(id) {
    if (!id || id === '') return null;
    return pandas.find(p => p.id === id);
  }

  function isWild(value) {
    if (!value) return true;
    const v = value.trim();
    return v === '野外' || v === '野外 ' || v === '野 外';
  }

  function getAllPandaOptions() {
    return pandas.map(p => ({
      id: p.id,
      name: p.name,
      alias: p.alias || '',
      display: getDisplayName(p)
    })).sort((a, b) => a.name.localeCompare(b.name));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const isStandard = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(dateStr);
    if (!isStandard) return dateStr;
    try {
      return new Date(dateStr).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
    } catch { return dateStr; }
  }

  function calcAge(birthdayStr) {
    if (!birthdayStr || birthdayStr.trim() === '') return null;
    const isStandard = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(birthdayStr);
    if (!isStandard) return null;
    let year = null, month = null, day = null;
    const cleaned = birthdayStr.replace(/\s+/g, '');
    let match = cleaned.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if (match) { year = parseInt(match[1]); month = parseInt(match[2])-1; day = parseInt(match[3]); }
    if (!match) {
      try { const d = new Date(birthdayStr);
        if (!isNaN(d.getTime())) { year = d.getFullYear(); month = d.getMonth(); day = d.getDate(); } } catch(e) {} }
    if (year === null || isNaN(year)) return null;
    if (month === null || isNaN(month)) month = 5;
    if (day === null || isNaN(day)) day = 30;
    month = Math.max(0, Math.min(11, month));
    day = Math.max(1, Math.min(30, day));
    const birth = new Date(year, month, day);
    if (isNaN(birth.getTime())) return null;
    const now = new Date();
    let years = now.getFullYear() - birth.getFullYear();
    let months = now.getMonth() - birth.getMonth();
    if (months < 0) { years--; months += 12; }
    if (years < 0) return null;
    if (years === 0 && months === 0) return '不到1个月';
    let parts = [];
    if (years > 0) parts.push(years + '岁');
    if (months > 0) parts.push(months + '个月');
    return parts.join('') || (years + '岁');
  }

  function isTodayBirthday(birthdayStr) {
    if (!birthdayStr) return false;
    const isStandard = /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(birthdayStr);
    if (!isStandard) return false;
    try {
      const d = new Date(birthdayStr);
      if (isNaN(d.getTime())) return false;
      const today = new Date();
      return d.getMonth() === today.getMonth() && d.getDate() === today.getDate();
    } catch { return false; }
  }

  function getRelationships(panda) {
    if (!panda) return { parents:[], siblingsSameParents:[], siblingsSameMother:[], siblingsSameFather:[], children:[], spouse:[] };
    const name = panda.name;
    let motherPanda = null;
    let fatherPanda = null;
    let motherName = '';
    let fatherName = '';

    if (panda.motherId) motherPanda = getPandaById(panda.motherId);
    if (!motherPanda && panda.mother && !isWild(panda.mother)) motherPanda = findPandaByName(panda.mother);
    if (motherPanda) motherName = motherPanda.name;

    if (panda.fatherId) fatherPanda = getPandaById(panda.fatherId);
    if (!fatherPanda && panda.father && !isWild(panda.father)) fatherPanda = findPandaByName(panda.father);
    if (fatherPanda) fatherName = fatherPanda.name;

    const parents = [];
    if (panda.mother && isWild(panda.mother)) {
      parents.push({ id: 'wild_mother', name: '🌿 野外', isWild: true });
    } else if (motherPanda) {
      parents.push({ ...motherPanda, isWild: false });
    } else if (panda.mother && panda.mother.trim() !== '') {
      parents.push({ id: 'unlinked_mother', name: panda.mother + ' (未关联)', isWild: false, unlinked: true });
    }
    if (panda.father && isWild(panda.father)) {
      parents.push({ id: 'wild_father', name: '🌿 野外', isWild: true });
    } else if (fatherPanda) {
      parents.push({ ...fatherPanda, isWild: false });
    } else if (panda.father && panda.father.trim() !== '') {
      parents.push({ id: 'unlinked_father', name: panda.father + ' (未关联)', isWild: false, unlinked: true });
    }

    const children = pandas.filter(p => {
      if (p.id === panda.id) return false;
      if (p.motherId && p.motherId === panda.id) return true;
      if (p.fatherId && p.fatherId === panda.id) return true;
      if (!p.motherId && p.mother && p.mother.trim() === name) return true;
      if (!p.fatherId && p.father && p.father.trim() === name) return true;
      return false;
    });

    const siblingsSameParents = [], siblingsSameMother = [], siblingsSameFather = [];
    pandas.forEach(p => {
      if (p.id === panda.id) return;
      let pMother = null, pFather = null;
      if (p.motherId) pMother = getPandaById(p.motherId);
      if (!pMother && p.mother && !isWild(p.mother)) pMother = findPandaByName(p.mother);
      if (p.fatherId) pFather = getPandaById(p.fatherId);
      if (!pFather && p.father && !isWild(p.father)) pFather = findPandaByName(p.father);
      const sameMother = motherPanda && pMother && motherPanda.id === pMother.id;
      const sameFather = fatherPanda && pFather && fatherPanda.id === pFather.id;
      if (sameMother && sameFather) siblingsSameParents.push(p);
      else if (sameMother && !sameFather) siblingsSameMother.push(p);
      else if (sameFather && !sameMother) siblingsSameFather.push(p);
    });

    const spouse = [];
    const myChildrenIds = children.map(c => c.id);
    pandas.forEach(p => {
      if (p.id === panda.id) return;
      if (parents.some(par => par.id === p.id)) return;
      if (children.some(child => child.id === p.id)) return;
      const pChildren = pandas.filter(c => {
        if (c.motherId && c.motherId === p.id) return true;
        if (c.fatherId && c.fatherId === p.id) return true;
        if (!c.motherId && c.mother && c.mother.trim() === p.name) return true;
        if (!c.fatherId && c.father && c.father.trim() === p.name) return true;
        return false;
      });
      if (pChildren.some(c => myChildrenIds.includes(c.id))) spouse.push(p);
    });

    return { parents, siblingsSameParents, siblingsSameMother, siblingsSameFather, children, spouse };
  }

  function getDistinctValues(field) {
    const values = new Set();
    pandas.forEach(p => {
      const v = p[field] || '';
      if (v.trim()) values.add(v.trim());
    });
    return Array.from(values).sort();
  }

  function updateStats() {
    const total = pandas.length;
    const male = pandas.filter(p => p.gender === '雄性').length;
    const female = pandas.filter(p => p.gender === '雌性').length;
    const orgs = new Set(pandas.map(p => p.org || '未归类'));
    const complete = pandas.filter(p => p.isComplete === true).length;
    const incomplete = total - complete;
    const birthday = pandas.filter(p => isTodayBirthday(p.birthday)).length;
    totalCount.textContent = total;
    maleCount.textContent = male;
    femaleCount.textContent = female;
    orgCount.textContent = orgs.size;
    completeCount.textContent = complete;
    incompleteCount.textContent = incomplete;
    birthdayCount.textContent = birthday;
  }

  function showPage(pageId) {
    document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0, 0);
  }

  // ================================================================
  // 主页（保留核心功能）
  // ================================================================
  function renderBrowse() {
    const pandastarList = [];
    const normalMap = new Map();

    let filteredPandas = pandas;
    if (currentFilter === 'complete') {
      filteredPandas = pandas.filter(p => p.isComplete === true);
    } else if (currentFilter === 'incomplete') {
      filteredPandas = pandas.filter(p => p.isComplete !== true);
    } else if (currentFilter === 'birthday') {
      filteredPandas = pandas.filter(p => isTodayBirthday(p.birthday));
    }

    filteredPandas.forEach(p => {
      if (p.location && p.location.trim() === '潘达星') {
        pandastarList.push(p);
      } else {
        const key = currentGroupMode === 'org' ? (p.org || '未归类') : (p.location || '未知所在地');
        if (!normalMap.has(key)) normalMap.set(key, []);
        normalMap.get(key).push(p);
      }
    });

    let html = '';
    const sortedKeys = Array.from(normalMap.keys()).sort();
    for (let key of sortedKeys) {
      const list = normalMap.get(key);
      const icon = currentGroupMode === 'org' ? 'fa-building' : 'fa-map-pin';
      html += `<div class="org-section"><div class="org-title">
        <i class="fas ${icon}"></i> ${key} <span class="count-badge">${list.length}只</span>
      </div><div class="panda-list">`;
      list.sort((a,b)=> a.name.localeCompare(b.name));
      list.forEach(p => {
        const cls = p.gender === '雌性' ? 'female' : (p.gender === '雄性' ? 'male' : '');
        const tag = p.gender ? (p.gender === '雌性' ? '♀' : (p.gender === '雄性' ? '♂' : '')) : '';
        const displayName = getDisplayName(p);
        const dotClass = p.isComplete ? 'complete' : 'incomplete';
        html += `<span class="panda-link" data-id="${p.id}">
          <span class="status-dot ${dotClass}"></span>
          ${displayName}
          ${tag ? `<span class="gender-tag ${cls}">${tag}</span>` : ''}
        </span>`;
      });
      html += '</div></div>';
    }

    if (pandastarList.length) {
      const dates = pandastarList.filter(p => p.passingDate).map(p => p.passingDate);
      let display = '';
      if (dates.length) {
        const sorted = dates.slice().sort();
        display = '🕊️ ' + sorted[0] + ' 〜 ' + sorted[sorted.length-1];
      }
      html += `<div class="org-section"><div class="org-title">
        <i class="fas fa-star" style="color:#d4a373;"></i> 潘达星 ✨ <span class="count-badge">${pandastarList.length}只</span>
        ${display ? `<span class="passing-date">${display}</span>` : ''}
      </div><div class="panda-list">`;
      pandastarList.sort((a,b)=> a.name.localeCompare(b.name));
      pandastarList.forEach(p => {
        const cls = p.gender === '雌性' ? 'female' : (p.gender === '雄性' ? 'male' : '');
        const tag = p.gender ? (p.gender === '雌性' ? '♀' : (p.gender === '雄性' ? '♂' : '')) : '';
        const displayName = getDisplayName(p);
        const dotClass = p.isComplete ? 'complete' : 'incomplete';
        html += `<span class="panda-link pandastar" data-id="${p.id}">
          <span class="status-dot ${dotClass}"></span>
          ${displayName}
          ${tag ? `<span class="gender-tag ${cls}">${tag}</span>` : ''}
        </span>`;
      });
      html += '</div></div>';
    }

    if (!html) {
      let msg = '暂无熊猫数据';
      if (currentFilter === 'complete') msg = '没有已完善的熊猫';
      else if (currentFilter === 'incomplete') msg = '没有待补充的熊猫';
      else if (currentFilter === 'birthday') msg = '🎂 今天没有熊猫过生日';
      html = '<div class="empty-state">' + msg + '</div>';
    }
    browseContainer.innerHTML = html;
    document.querySelectorAll('.panda-link[data-id]').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) openDetail(p.id);
      });
    });
    updateStats();
    saveData();
  }

  function setGroupMode(mode) {
    currentGroupMode = mode;
    groupByOrgBtn.classList.toggle('active', mode === 'org');
    groupByLocationBtn.classList.toggle('active', mode === 'location');
    if (searchInput.value.trim()) searchInput.value = '';
    renderBrowse();
  }

  function setFilter(filter) {
    currentFilter = filter;
    filterAllBtn.classList.toggle('active', filter === 'all');
    filterCompleteBtn.classList.toggle('active', filter === 'complete');
    filterIncompleteBtn.classList.toggle('active', filter === 'incomplete');
    filterBirthdayBtn.classList.toggle('active', filter === 'birthday');
    if (searchInput.value.trim()) searchInput.value = '';
    renderBrowse();
  }

  // ================================================================
  // 搜索（主页）
  // ================================================================
  function updateSuggestions(keyword) {
    if (!keyword || keyword.length < 1) { searchSuggestions.classList.remove('show'); return; }
    const kw = keyword.toLowerCase();
    const results = pandas.filter(p => {
      const nameMatch = p.name.toLowerCase().includes(kw);
      const aliasMatch = p.alias && p.alias.toLowerCase().includes(kw);
      const orgMatch = p.org && p.org.toLowerCase().includes(kw);
      const locMatch = p.location && p.location.toLowerCase().includes(kw);
      return nameMatch || aliasMatch || orgMatch || locMatch;
    }).slice(0, 8);
    if (results.length === 0) { searchSuggestions.classList.remove('show'); return; }
    let html = '';
    results.forEach(p => {
      const displayName = getDisplayName(p);
      const dotClass = p.isComplete ? 'complete' : 'incomplete';
      html += `<div class="suggestion-item" data-id="${p.id}">
        <span class="s-name"><span class="status-dot ${dotClass}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;"></span>${displayName}</span>
        <span class="s-sub">${p.org||'—'} · ${p.location||'—'}</span>
      </div>`;
    });
    searchSuggestions.innerHTML = html;
    searchSuggestions.classList.add('show');
    searchSuggestions.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) { searchInput.value = p.name; searchSuggestions.classList.remove('show'); doSearch(); }
      });
    });
  }

  function doSearch() {
    const keyword = searchInput.value.trim();
    searchSuggestions.classList.remove('show');
    if (!keyword) { renderBrowse(); return; }
    const kw = keyword.toLowerCase();
    const results = pandas.filter(p => {
      const nameMatch = p.name.toLowerCase().includes(kw);
      const aliasMatch = p.alias && p.alias.toLowerCase().includes(kw);
      const orgMatch = p.org && p.org.toLowerCase().includes(kw);
      const locMatch = p.location && p.location.toLowerCase().includes(kw);
      return nameMatch || aliasMatch || orgMatch || locMatch;
    });
    if (results.length === 0) {
      browseContainer.innerHTML = '<div class="empty-state" style="padding:30px 8px;">未找到 “' + keyword + '”</div>';
      return;
    }
    let html = '<div class="result-grid">';
    results.forEach(p => {
      const cls = p.gender === '雌性' ? 'female' : (p.gender === '雄性' ? 'male' : '');
      const displayName = getDisplayName(p);
      const dotClass = p.isComplete ? 'complete' : 'incomplete';
      html += `<div class="result-card" data-id="${p.id}">
        <span class="status-dot ${dotClass}"></span>
        <div>
          <div class="name">${displayName} <span class="gender-badge ${cls}">${p.gender||'未知'}</span></div>
          <div class="sub">${p.org||'—'} · ${p.location||'—'}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    browseContainer.innerHTML = html;
    document.querySelectorAll('.result-card[data-id]').forEach(el => {
      el.addEventListener('click', function() {
        const p = getPandaById(this.dataset.id);
        if (p) openDetail(p.id);
      });
    });
  }

  // ================================================================
  // 所在地档案
  // ================================================================
  function getLocList() {
    const locSet = new Set();
    pandas.forEach(p => {
      if (p.location && p.location.trim() && p.location.trim() !== '潘达星') {
        locSet.add(p.location.trim());
      }
    });
    return Array.from(locSet).sort();
  }

  function renderLocArchive() {
    const locList = getLocList();
    const filterLoc = document.getElementById('locFilterSelect').value;
    const searchKeyword = document.getElementById('locSearchInput').value.trim().toLowerCase();

    const locEventMap = new Map();
    locList.forEach(loc => locEventMap.set(loc, []));

    locEvents.forEach(e => {
      if (locEventMap.has(e.locName)) {
        locEventMap.get(e.locName).push(e);
      }
    });

    let filteredLocList = locList;
    if (filterLoc !== 'all') {
      filteredLocList = locList.filter(o => o === filterLoc);
    }

    let html = '';
    filteredLocList.forEach(loc => {
      let events = locEventMap.get(loc) || [];
      events = events.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

      if (searchKeyword) {
        events = events.filter(e => e.event.toLowerCase().includes(searchKeyword));
      }

      if (events.length === 0) {
        if (locEventMap.get(loc)?.length > 0 && events.length === 0) {
          html += `<div class="loc-archive-section">
            <div class="loc-archive-title">📍 ${loc} <span class="count-badge">0 条匹配</span></div>
            <div class="loc-archive-empty">没有匹配的事件</div>
          </div>`;
        }
        return;
      }

      html += `<div class="loc-archive-section">
        <div class="loc-archive-title">📍 ${loc} <span class="count-badge">${events.length} 件大事</span></div>`;

      events.forEach(e => {
        const dateDisplay = e.date || '未知日期';
        html += `
          <div class="loc-event-item" data-id="${e.id}">
            <span class="event-date">${dateDisplay}</span>
            <span class="event-text">${e.event}</span>
            <button class="del-event-btn" data-id="${e.id}" title="删除">×</button>
          </div>
        `;
      });

      html += `</div>`;
    });

    if (!html) {
      if (locList.length === 0) {
        html = '<div class="empty-state">暂无所在地数据，请先在熊猫档案中录入所在地信息</div>';
      } else {
        html = '<div class="empty-state">暂无所在地大事记录，点击「添加大事」开始记录</div>';
      }
    }

    document.getElementById('locArchiveContainer').innerHTML = html;

    document.querySelectorAll('.loc-event-item .del-event-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        if (confirm('确定要删除这条大事记录吗？')) {
          locEvents = locEvents.filter(e => e.id !== id);
          saveLocEvents();
          renderLocArchive();
        }
      });
    });
  }

  // ================================================================
  // 所在地档案：添加事件
  // ================================================================
  function openAddEventModal() {
    const overlay = document.getElementById('addEventOverlay');
    const select = document.getElementById('addEventLocSelect');
    const dateInput = document.getElementById('addEventDate');
    const textInput = document.getElementById('addEventText');

    const locList = getLocList();
    select.innerHTML = '<option value="">请选择所在地</option>';
    locList.forEach(loc => {
      select.innerHTML += `<option value="${loc}">${loc}</option>`;
    });

    const today = new Date().toISOString().slice(0, 10);
    dateInput.value = today;
    textInput.value = '';

    overlay.classList.add('active');
  }

  function closeAddEventModal() {
    document.getElementById('addEventOverlay').classList.remove('active');
  }

  function confirmAddEvent() {
    const select = document.getElementById('addEventLocSelect');
    const dateInput = document.getElementById('addEventDate');
    const textInput = document.getElementById('addEventText');

    const loc = select.value.trim();
    const date = dateInput.value.trim();
    const text = textInput.value.trim();

    if (!loc) { alert('请选择所在地'); return; }
    if (!date) { alert('请选择日期'); return; }
    if (!text) { alert('请输入事件内容'); return; }

    const newEvent = {
      id: 'le_' + (locEventNextId++),
      locName: loc,
      date: date,
      event: text
    };
    locEvents.push(newEvent);
    saveLocEvents();
    closeAddEventModal();
    renderLocArchive();
  }

  // ================================================================
  // 详情页、编辑页等（保留占位，实际项目中需完整保留）
  // ================================================================
  function openDetail(pandaId) {
    alert('详情页功能已保留，请查看完整代码');
  }

  function openEdit(pandaId) {
    alert('编辑页功能已保留，请查看完整代码');
  }

  function openTree(pandaId) {
    alert('族谱功能已保留，请查看完整代码');
  }

  // ================================================================
  // 导航切换
  // ================================================================
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      const page = this.dataset.page;
      if (page === 'pageHome') {
        showPage('pageHome');
        renderBrowse();
      } else if (page === 'pageLocArchive') {
        showPage('pageLocArchive');
        const select = document.getElementById('locFilterSelect');
        const currentVal = select.value;
        const locList = getLocList();
        select.innerHTML = '<option value="all">全部所在地</option>';
        locList.forEach(loc => {
          select.innerHTML += `<option value="${loc}">${loc}</option>`;
        });
        select.value = currentVal;
        renderLocArchive();
      }
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // ================================================================
  // 所在地档案事件绑定
  // ================================================================
  document.getElementById('locFilterSelect').addEventListener('change', renderLocArchive);
  document.getElementById('locSearchBtn').addEventListener('click', renderLocArchive);
  document.getElementById('locSearchInput').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') renderLocArchive();
  });

  document.getElementById('addLocEventBtn').addEventListener('click', openAddEventModal);
  document.getElementById('addEventCancelBtn').addEventListener('click', closeAddEventModal);
  document.getElementById('addEventConfirmBtn').addEventListener('click', confirmAddEvent);
  document.getElementById('addEventOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAddEventModal();
  });

  // ================================================================
  // 保存数据
  // ================================================================
  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pandas));
      document.getElementById('storageStatus').textContent = `💾 ${pandas.length} 条数据已保存`;
    } catch (e) {
      document.getElementById('storageStatus').textContent = '⚠️ 保存失败';
    }
  }

  // ================================================================
  // 初始化
  // ================================================================
  document.querySelector('.nav-tab.active').classList.remove('active');
  document.querySelector('.nav-tab[data-page="pageHome"]').classList.add('active');
  showPage('pageHome');
  renderBrowse();

  const initSelect = document.getElementById('locFilterSelect');
  const initLocList = getLocList();
  initSelect.innerHTML = '<option value="all">全部所在地</option>';
  initLocList.forEach(loc => {
    initSelect.innerHTML += `<option value="${loc}">${loc}</option>`;
  });

})();
</script>
